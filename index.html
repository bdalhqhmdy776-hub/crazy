<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>👑 CRAZY 👑</title>
    <style>
        :root {
            --bg: #06060e; --surface: #0f0f23; --card: #16163a; --border: #252550;
            --gold: #f0a500; --red: #e94560; --green: #4e9f3d; --purple: #8b5cf6;
            --cyan: #06b6d4; --orange: #f97316; --text: #e2e2e2; --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Cairo', 'Arial', sans-serif; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; color: var(--text); position: fixed; top: 0; left: 0; }
        .app { width: 100vw; height: 100vh; max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }

        .fullscreen-ad-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .fullscreen-ad-overlay.show { display: flex; }
        .fullscreen-ad-overlay img, .fullscreen-ad-overlay video { width: 100%; height: 100%; object-fit: fill; position: absolute; top: 0; left: 0; }
        .fullscreen-sound-hint { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 15px 25px; border-radius: 30px; font-size: 14px; z-index: 11; font-weight: bold; border: 2px solid #f0a500; cursor: pointer; animation: pulse-hint 1.5s ease-in-out infinite; text-align: center; }
        .fullscreen-sound-hint.hidden { display: none; }
        @keyframes pulse-hint { 0%, 100% { box-shadow: 0 0 10px rgba(240,165,0,0.5); } 50% { box-shadow: 0 0 30px rgba(240,165,0,0.9); transform: translateX(-50%) scale(1.05); } }
        .fullscreen-ad-skip { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); color: #fff; border: 2px solid #fff; padding: 10px 20px; border-radius: 25px; font-size: 14px; cursor: pointer; z-index: 10; font-weight: bold; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
        .fullscreen-ad-skip.visible { opacity: 1; pointer-events: auto; }
        .fullscreen-ad-timer { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: #fff; padding: 10px 16px; border-radius: 25px; font-size: 14px; z-index: 10; font-weight: bold; }

        .screen { display: none; flex-direction: column; width: 100%; height: 100%; flex: 1; overflow-y: auto; padding: 4px; gap: 4px; position: relative; z-index: 1; }
        .screen.active { display: flex; }
        .screen-bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; opacity: 0.3; display: none; }
        .header { text-align: center; padding: 10px 6px; background: rgba(22,22,58,0.7); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; position: relative; z-index: 1; }
        .header h1 { font-size: 18px; color: var(--red); margin: 0; }
        .header.admin-h { border-color: var(--gold); box-shadow: 0 0 20px rgba(240,165,0,0.3); }
        .header.admin-h h1 { color: var(--gold); }

        .btn { background: var(--red); color: #fff; border: none; padding: 10px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; width: 100%; flex-shrink: 0; transition: all 0.2s; position: relative; z-index: 1; }
        .btn:active { transform: scale(0.96); opacity: 0.85; }
        .btn.sm { padding: 7px 12px; font-size: 11px; width: auto; border-radius: 14px; }
        .btn.outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn.cyan { background: var(--cyan); color: #000; }
        .btn.danger { background: #b91c1c; }
        .btn.purple { background: var(--purple); color: #fff; }
        .btn-row { display: flex; gap: 5px; flex-shrink: 0; position: relative; z-index: 1; }
        .btn-row .btn { flex: 1; }

        input, select, textarea { width: 100%; padding: 10px; font-size: 13px; background: rgba(22,22,58,0.7); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; text-align: center; outline: none; flex-shrink: 0; position: relative; z-index: 1; }
        textarea { text-align: right; min-height: 60px; resize: vertical; }
        .status-msg { text-align: center; font-size: 9px; padding: 3px; border-radius: 6px; flex-shrink: 0; position: relative; z-index: 1; }
        .status-msg.online { color: #4e9f3d; background: rgba(5,26,5,0.7); }
        .ad-banner { width: 100%; overflow: hidden; flex-shrink: 0; border-radius: 8px; background: rgba(22,22,58,0.4); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; z-index: 1; }
        .ad-banner.image-ad { height: 200px; }
        .ad-banner.text-ad { height: 25px; }
        .ad-banner.video-ad { height: 200px; background: #000; }
        .ad-banner.video-ad video { width: 100%; height: 100%; object-fit: fill; border-radius: 8px; }
        .ad-slide-image { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .ad-slide-image img { height: 200px; width: 400px; object-fit: cover; border-radius: 8px; position: absolute; opacity: 0; transition: opacity 0.8s; }
        .ad-slide-image img.active { opacity: 1; }
        .ad-slide-text { white-space: nowrap; animation: marqueeRTL 28s linear infinite; font-size: 12px; font-weight: bold; color: #fff; text-shadow: 0 0 8px rgba(240,165,0,0.8); padding: 0 10px; line-height: 25px; }
        @keyframes marqueeRTL { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .gear-icon-btn { position: absolute; top: 8px; right: 8px; width: 38px; height: 38px; border-radius: 50%; background: var(--gold); color: #000; font-size: 20px; border: none; cursor: pointer; z-index: 5; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px rgba(240,165,0,0.5); }
        .gear-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; display: none; align-items: center; justify-content: center; }
        .gear-popup-overlay.show { display: flex; }
        .gear-popup { background: rgba(22,22,58,0.95); backdrop-filter: blur(15px); border: 2px solid var(--gold); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; min-width: 180px; text-align: center; }
        .gear-popup h3 { color: var(--gold); font-size: 16px; }
        .gear-popup-options { display: flex; gap: 12px; justify-content: center; }
        .gear-popup-option { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); background: transparent; color: var(--gold); font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .gear-popup-option.active { background: var(--gold); color: #000; }

        .wheel-container { position: relative; width: 100%; max-width: 390px; aspect-ratio: 1; margin: 0 auto; flex-shrink: 0; z-index: 1; }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 22%; height: 22%; border-radius: 50%; background: rgba(240,165,0,0.9); display: flex; align-items: center; justify-content: center; font-size: 200%; font-weight: bold; color: #000; z-index: 2; box-shadow: 0 0 25px rgba(240,165,0,0.7); overflow: hidden; }
        .wheel-center img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .wheel-slot { position: absolute; width: 18%; height: 18%; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(22,22,58,0.8); backdrop-filter: blur(5px); transition: all 0.2s; z-index: 1; top: 50%; left: 50%; transform: translate(-50%, -50%); flex-direction: column; gap: 1px; pointer-events: auto; }
        .wheel-slot.veg { box-shadow: 0 0 12px rgba(78,159,61,0.4); }
        .wheel-slot.meat { box-shadow: 0 0 12px rgba(233,69,96,0.4); }
        .wheel-slot.pred-top { box-shadow: 0 0 25px rgba(255,0,0,0.9); animation: pulse-evil 0.8s infinite; background: rgba(40,10,10,0.9); }
        .wheel-slot.pred-mid { box-shadow: 0 0 18px rgba(255,140,0,0.7); background: rgba(40,25,5,0.85); }
        .wheel-slot.pred-none { opacity: 0.45; box-shadow: none; background: rgba(22,22,58,0.5); }
        @keyframes pulse-evil { 0%, 100% { box-shadow: 0 0 18px rgba(255,0,0,0.7); } 50% { box-shadow: 0 0 35px rgba(255,0,0,1); } }
        .slot-badge { font-size: 75%; }
        .slot-prob { font-size: 32%; color: var(--gold); font-weight: bold; }

        .gear-strip { background: rgba(2,2,8,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 6px; display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; min-height: 55px; align-items: center; flex-shrink: 0; margin-top: auto; z-index: 1; }
        .gear-slot { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; background: rgba(10,10,34,0.7); border: 1px solid rgba(42,42,74,0.5); }
        .gear-slot.newest { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .gear-slot.removed { border-color: #e94560; box-shadow: 0 0 8px rgba(233,69,96,0.6); background: rgba(40,10,10,0.6); }

        .counter-box { display: flex; justify-content: space-around; background: rgba(22,22,58,0.7); backdrop-filter: blur(10px); border-radius: 10px; padding: 8px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; text-align: center; z-index: 1; }
        .counter-value { font-size: 18px; font-weight: bold; }
        .counter-value.correct { color: var(--green); }
        .counter-value.wrong { color: var(--red); }
        .counter-percent { font-size: 13px; font-weight: bold; color: var(--gold); }
        .learn-log { font-size: 8px; color: var(--muted); font-family: monospace; background: rgba(2,2,8,0.7); padding: 6px; border-radius: 8px; flex-shrink: 0; max-height: 40px; overflow-y: auto; z-index: 1; }
        .game-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; z-index: 1; }
        .game-card { background: rgba(22,22,58,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 18px 8px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: all 0.2s; }
        .game-card:active { transform: scale(0.95); border-color: var(--gold); }
        .game-card h3 { font-size: 13px; color: var(--gold); }
        .game-card .game-icon { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; font-size: 35px; display: flex; align-items: center; justify-content: center; }
        .section { background: rgba(22,22,58,0.7); backdrop-filter: blur(10px); border-radius: 10px; padding: 8px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; z-index: 1; }
        .section h3 { font-size: 13px; color: var(--gold); margin-bottom: 6px; }
        .row { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; flex-wrap: wrap; }
        .row label { font-size: 10px; color: var(--muted); min-width: 55px; }
        .row input, .row select { flex: 1; min-width: 60px; padding: 7px; font-size: 11px; }
        .pass-list { max-height: 200px; overflow-y: auto; font-size: 9px; }
        .pass-item { display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 1px solid rgba(26,26,58,0.5); gap: 3px; font-size: 9px; background: rgba(10,10,40,0.5); border-radius: 6px; margin-bottom: 3px; }
        .pass-item button { background: #b91c1c; color: #fff; border: none; padding: 3px 7px; border-radius: 4px; font-size: 8px; cursor: pointer; }
        .pass-item button.unlock { background: var(--orange); }
        .game-list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: rgba(10,10,40,0.7); border-radius: 8px; margin-bottom: 4px; gap: 6px; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .game-list-item button { background: #b91c1c; color: #fff; border: none; padding: 3px 6px; border-radius: 4px; font-size: 8px; cursor: pointer; margin: 1px; }
        .game-list-item button.edit { background: var(--purple); }
        .ad-list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: rgba(10,10,40,0.7); border-radius: 8px; margin-bottom: 4px; gap: 6px; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-delete-ad { background: #dc2626 !important; color: white !important; border: none !important; padding: 6px 10px !important; border-radius: 6px !important; cursor: pointer !important; font-size: 10px !important; font-weight: bold !important; }
        .admin-tabs { display: flex; gap: 3px; flex-shrink: 0; margin-bottom: 6px; z-index: 1; }
        .admin-tab { flex: 1; padding: 8px; text-align: center; background: rgba(22,22,58,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-size: 10px; color: var(--muted); transition: all 0.2s; }
        .admin-tab.active { background: rgba(240,165,0,0.3); border-color: var(--gold); color: #fff; font-weight: bold; }
        .tabs { display: flex; gap: 3px; flex-shrink: 0; z-index: 1; }
        .tabs .tab { flex: 1; padding: 8px; text-align: center; background: rgba(22,22,58,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-size: 10px; color: var(--muted); transition: all 0.2s; }
        .tabs .tab.active { background: rgba(139,92,246,0.3); border-color: var(--purple); color: #fff; font-weight: bold; }
        .spacer { flex: 1; }
        .error-msg { color: #ff6b6b; text-align: center; font-size: 11px; flex-shrink: 0; z-index: 1; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
        #gameScreen { gap: 2px; padding: 2px; }
    </style>
</head>
<body>
    <div class="fullscreen-ad-overlay" id="fullscreenAd">
        <div class="fullscreen-ad-timer" id="fullscreenAdTimer">5</div>
        <button class="fullscreen-ad-skip" id="fullscreenAdSkip" onclick="skipFullscreenAd()">تخطي ✕</button>
        <div class="fullscreen-sound-hint" id="fullscreenSoundHint" onclick="unmuteFullscreenAd()">👆 المس لتشغيل الصوت 🔊</div>
    </div>

    <div class="app" id="appRoot">
        <div class="screen active" id="loginScreen">
            <div class="screen-bg-overlay" id="loginScreenBg"></div>
            <div class="ad-banner image-ad" id="loginAd" style="display:none;"></div>
            <div class="spacer"></div>
            <div class="header"><h1>👑 CRAZY 👑</h1></div>
            <div class="status-msg online" id="connectionStatus">🟡</div>
            <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
                <input type="password" id="passInput" placeholder="🔐 كلمة المرور" autocomplete="off">
                <button class="btn" onclick="cpw()">🔓 دخول</button>
                <p class="error-msg" id="loginError"></p>
            </div>
            <div class="spacer"></div>
        </div>
        <div class="screen" id="gameSelectScreen">
            <div class="screen-bg-overlay" id="gamesScreenBg"></div>
            <div class="ad-banner image-ad" id="gamesAd" style="display:none;"></div>
            <div class="header"><h1>🎮 اختر اللعبة</h1><div id="selectUser" style="font-size:9px;color:var(--muted);"></div></div>
            <div class="game-cards" id="gameCardsContainer"></div>
            <div class="btn-row"><button class="btn sm outline" onclick="lo()">🚪 خروج</button></div>
        </div>
        <div class="screen" id="gameScreen">
            <div class="screen-bg-overlay" id="predictScreenBg"></div>
            <div class="ad-banner text-ad" id="predictAd" style="display:none;"><div class="ad-slide-text" id="predictAdSlide"></div></div>
            <div class="wheel-container" id="wheelContainer"><div class="wheel-center" id="wheelCenter">🎯</div></div>
            <div class="gear-strip" id="gearStrip"></div>
            <div class="counter-box">
                <div><span class="counter-value correct" id="correctCount">0</span><span class="counter-label">✅</span></div>
                <div><span class="counter-percent" id="percentDisplay">0%</span></div>
                <div><span class="counter-value wrong" id="wrongCount">0</span><span class="counter-label">❌</span></div>
            </div>
            <div class="learn-log" id="learnLog"><div>🟢 جاهز</div></div>
            <div class="btn-row">
                <button class="btn sm danger" onclick="resetGame()">🔄</button>
                <button class="btn sm cyan" onclick="exportData()">📊</button>
                <button class="btn sm outline" onclick="backToGames()">🔙</button>
            </div>
        </div>
        <div class="screen" id="adminScreen">
            <div class="header admin-h"><h1>👑 لوحة التحكم</h1></div>
            <div class="status-msg online" id="adminConnStatus">🟡</div>
            <div class="admin-tabs">
                <div class="admin-tab active" onclick="switchAdminTab('players')">👥 المشتركين</div>
                <div class="admin-tab" onclick="switchAdminTab('games')">🎮 البرامج</div>
                <div class="admin-tab" onclick="switchAdminTab('ads')">📢 الإعلانات</div>
                <div class="admin-tab" onclick="switchAdminTab('patterns')">📊 الأنماط</div>
            </div>
            <div id="adminPlayersTab">
                <div class="section"><h3>➕ إضافة مشترك جديد</h3>
                    <div class="row"><label>المعرف:</label><input type="text" id="newId" placeholder="اسم المشترك"></div>
                    <div class="row"><label>المفتاح:</label><input type="text" id="newKey" placeholder="المفتاح السري"></div>
                    <div class="row"><label>النمط:</label><select id="newMode"><option value="fixed">ثابت</option><option value="day">يومي</option><option value="hour">ساعي</option><option value="month">شهري</option></select></div>
                    <div class="row"><label>ساعات:</label><input type="number" id="newHours" value="0" min="0"></div>
                    <div class="row"><label>أيام:</label><input type="number" id="newDays" value="0" min="0"></div>
                    <button class="btn sm" style="background:#f97316;" onclick="addPlayer()">✅ إضافة</button>
                </div>
                <div class="section" style="flex:1;min-height:150px;"><h3>📋 المشتركين (<span id="passCount">0</span>)</h3><div class="pass-list" id="passList"></div>
                    <div class="btn-row" style="margin-top:6px;"><button class="btn sm danger" onclick="deleteAllPlayers()">🗑 حذف الكل</button><button class="btn sm" style="background:#f97316;" onclick="unlockAllPlayers()">🔓 فك الكل</button></div>
                </div>
            </div>
            <div id="adminGamesTab" style="display:none;">
                <div class="tabs" id="gamesTabs">
                    <div class="tab active" onclick="switchGamesTab('list')">📋 البرامج</div>
                    <div class="tab" onclick="switchGamesTab('add')">➕ إضافة</div>
                </div>
                <div class="section" id="gamesListSection" style="flex:1;min-height:200px;"><h3>🎮 البرامج الحالية</h3><div id="gameListContainer" style="max-height:250px;overflow-y:auto;"></div></div>
                <div class="section" id="gamesFormSection" style="display:none;flex:1;">
                    <h3 id="gamesFormTitle">➕ إضافة برنامج جديد</h3>
                    <input type="hidden" id="editGameKey" value="">
                    <div class="row"><label>المفتاح:</label><input type="text" id="gameKey" placeholder="مثلاً: zena"></div>
                    <div class="row"><label>الاسم:</label><input type="text" id="gameName" placeholder="مثلاً: 🎯 زينا لايف"></div>
                    <div class="row"><label>صورة:</label><input type="text" id="gameImage" placeholder="رابط أو إيموجي"></div>
                    <div class="row"><label>الخضار:</label><input type="text" id="gameVeg" placeholder="🥕,🌽,🍅,🌶"></div>
                    <div class="row"><label>اللحوم:</label><input type="text" id="gameMeat" placeholder="🍤,🐮,🐟,🐤"></div>
                    <div class="row"><label>الساعة:</label><textarea id="gameClock" placeholder="الساعة 12: 🥕&#10;الساعة 1:30: 🍤&#10;..."></textarea></div>
                    <div class="row"><label>طول الشريط:</label><input type="number" id="gameStripLen" value="21" min="5" max="50"></div>
                    <div class="btn-row"><button class="btn sm purple" onclick="saveGame()">💾 حفظ</button><button class="btn sm danger" onclick="cancelGameEdit()">❌ إلغاء</button></div>
                </div>
            </div>
            <div id="adminAdsTab" style="display:none;">
                <div class="section"><h3>➕ إضافة إعلان</h3>
                    <div class="row"><label>النوع:</label><select id="adType"><option value="image">🖼️ صورة</option><option value="text">📝 نص</option><option value="video">🎬 فيديو</option><option value="background">🎨 خلفية</option><option value="fullscreen">📱 ملء الشاشة</option></select></div>
                    <div class="row"><label>المكان:</label><select id="adPlace"><option value="login">🔐 الدخول</option><option value="games">🎮 البرامج</option><option value="predict">🎯 التوقعات</option></select></div>
                    <div class="row"><label>المحتوى:</label><input type="text" id="adContent" placeholder="رابط أو نص"></div>
                    <button class="btn sm" style="background:#f97316;" onclick="addAd()">✅ إضافة</button>
                </div>
                <div class="section" style="flex:1;min-height:150px;"><h3>📋 الإعلانات (<span id="adCountDisplay">0</span>)</h3><div id="adListContainer" style="max-height:250px;overflow-y:auto;"></div>
                    <div class="btn-row" style="margin-top:6px;"><button class="btn sm danger" onclick="deleteAllAds()">🗑 مسح الكل</button></div>
                </div>
            </div>
            <div id="adminPatternsTab" style="display:none;">
                <div class="section"><h3>📊 الأنماط</h3>
                    <div class="row"><label>البرنامج:</label><select id="patternGameSelect" onchange="loadPatterns()"><option value="">اختر</option></select></div>

                </div>

    function goToLogin() { showScreen('loginScreen'); }
    function backToGames() { showScreen('gameSelectScreen'); }
    function switchAdminTab(tab) { const tabs = ['players', 'games', 'ads', 'patterns']; document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.admin-tab')[tabs.indexOf(tab)].classList.add('active'); document.getElementById('adminPlayersTab').style.display = tab === 'players' ? 'block' : 'none'; document.getElementById('adminGamesTab').style.display = tab === 'games' ? 'block' : 'none'; document.getElementById('adminAdsTab').style.display = tab === 'ads' ? 'block' : 'none'; document.getElementById('adminPatternsTab').style.display = tab === 'patterns' ? 'block' : 'none'; if (tab === 'players') rpl(); if (tab === 'games') refreshGameList(); if (tab === 'ads') ral(); if (tab === 'patterns') loadPatterns(); }

    function switchGamesTab(tab) {
        document.querySelectorAll('#gamesTabs .tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('#gamesTabs .tab')[tab === 'list' ? 0 : 1].classList.add('active');
        document.getElementById('gamesListSection').style.display = tab === 'list' ? 'block' : 'none';
        document.getElementById('gamesFormSection').style.display = tab === 'add' ? 'block' : 'none';
        if (tab === 'list') refreshGameList();
        if (tab === 'add') { document.getElementById('gamesFormTitle').textContent = '➕ إضافة برنامج جديد'; clearGameForm(); }
    }
    function clearGameForm() { ['editGameKey','gameKey','gameName','gameImage','gameVeg','gameMeat','gameClock','gameStripLen'].forEach(id => document.getElementById(id).value = ''); document.getElementById('gameStripLen').value = '21'; }
    function refreshGameList() { const c = document.getElementById('gameListContainer'); if (!c) return; c.innerHTML = Object.entries(G).map(([k, g]) => `<div class="game-list-item"><div><strong style="color:var(--gold);">${g.n}</strong><br><small>${k} | 🟢${g.v.length} 🥩${g.m.length} | شريط:${g.sl||21}</small></div><div><button class="edit" onclick="editGame('${k}')">✏️</button><button onclick="deleteGame('${k}')">🗑</button></div></div>`).join(''); }
    function editGame(key) { const g = G[key]; if (!g) return; document.getElementById('editGameKey').value = key; document.getElementById('gameKey').value = key; document.getElementById('gameName').value = g.n; document.getElementById('gameImage').value = g.img || ''; document.getElementById('gameVeg').value = g.v.join(','); document.getElementById('gameMeat').value = g.m.join(','); document.getElementById('gameClock').value = (g.clock || []).map((s, i) => `الساعة ${['12','1:30','3','4:30','6','7:30','9','10:30'][i]||(i+1)}: ${s}`).join('\n'); document.getElementById('gameStripLen').value = g.sl || 21; document.getElementById('gamesFormTitle').textContent = '✏️ تعديل: ' + g.n; document.getElementById('gamesListSection').style.display = 'none'; document.getElementById('gamesFormSection').style.display = 'block'; }
    async function saveGame() { const ek = document.getElementById('editGameKey').value, key = document.getElementById('gameKey').value.trim().toLowerCase(); const name = document.getElementById('gameName').value.trim(), img = document.getElementById('gameImage').value.trim(); const veg = document.getElementById('gameVeg').value.split(/[,،\s]+/).filter(Boolean); const meat = document.getElementById('gameMeat').value.split(/[,،\s]+/).filter(Boolean); const sl = parseInt(document.getElementById('gameStripLen').value) || 21; if (!key || !name) return alert('المفتاح والاسم مطلوبين'); if (veg.length < 2 || meat.length < 2) return alert('رموز الخضار واللحوم (2 على الأقل)'); let clock = []; const cl = document.getElementById('gameClock').value.trim().split('\n').filter(Boolean); if (cl.length === 8) clock = cl.map(l => l.split(/[:：]\s*/).pop().trim()); else clock = [...veg, ...meat].slice(0, 8); if (ek && ek !== key) delete G[ek]; G[key] = { n: name, v: veg, m: meat, a: [...veg, ...meat], clock, img, sl }; ss('kf_games', G); if (isOnline && db) db.ref('games').set(G).catch(() => {}); await buildGC(); switchGamesTab('list'); alert('✅ تم حفظ ' + name); }
    async function deleteGame(key) { if (!confirm('حذف ' + (G[key]?.n || key) + '؟')) return; delete G[key]; ss('kf_games', G); if (isOnline && db) db.ref('games').set(G).catch(() => {}); await buildGC(); refreshGameList(); }
    function cancelGameEdit() { switchGamesTab('list'); }

    async function buildGC() { const c = document.getElementById('gameCardsContainer'); if (!c) return; c.innerHTML = Object.entries(G).map(([k, g]) => { const icon = g.img && g.img.startsWith('http') ? `<img class="game-icon" src="${g.img}" style="width:55px;height:55px;border-radius:50%;object-fit:cover;">` : `<span class="game-icon">${g.img || g.n.split(' ')[0] || '🎯'}</span>`; return `<div class="game-card" onclick="startGame('${k}')">${icon}<h3>${g.n}</h3><small style="color:var(--muted);">شريط: ${g.sl || 21}</small></div>`; }).join(''); }

    async function addPlayer() { const id = document.getElementById('newId').value.trim(), key = document.getElementById('newKey').value.trim(); const mode = document.getElementById('newMode').value, hrs = parseInt(document.getElementById('newHours').value) || 0, dys = parseInt(document.getElementById('newDays').value) || 0; if (!id || !key) return alert('املأ'); let pl = ls('kf_pl', {}); if (Object.keys(pl).length >= 200) return alert('200 حد أقصى'); if (pl[id]) return alert('موجود'); pl[id] = { id, key, mode, maxHours: hrs, maxDays: dys, ld: null, ca: null }; ss('kf_pl', pl); if (isOnline && db) db.ref('players').set(pl).catch(() => {}); ['newId', 'newKey'].forEach(d => document.getElementById(d).value = ''); document.getElementById('newHours').value = '0'; document.getElementById('newDays').value = '0'; rpl(); alert('✅ ' + id); }
    async function dp(id) { if (!confirm('⚠️ حذف: ' + id + '؟')) return; let pl = ls('kf_pl', {}); delete pl[id]; ss('kf_pl', pl); if (isOnline && db) db.ref('players').set(pl).catch(() => {}); rpl(); }
    async function dap() { if (!confirm('⚠️ حذف الكل؟')) return; ss('kf_pl', {}); if (isOnline && db) db.ref('players').set({}).catch(() => {}); rpl(); }
    async function uap() { if (!confirm('🔓 فك الكل؟')) return; let pl = ls('kf_pl', {}); for (const p of Object.values(pl)) { p.ld = null; p.ca = null; } ss('kf_pl', pl); if (isOnline && db) db.ref('players').set(pl).catch(() => {}); rpl(); }
    async function up(id) { let pl = ls('kf_pl', {}); if (pl[id]) { pl[id].ld = null; pl[id].ca = null; ss('kf_pl', pl); if (isOnline && db) db.ref('players').set(pl).catch(() => {}); rpl(); } }
    function rpl() { const pl = ls('kf_pl', {}), arr = Object.values(pl); document.getElementById('passCount').textContent = arr.length; const c = document.getElementById('passList'); if (!c) return; if (!arr.length) { c.innerHTML = '<p style="color:#888;text-align:center;">📭 لا يوجد</p>'; return; } c.innerHTML = arr.map(p => { const token = gtk(p.key, p.mode), exp = p.ca ? cex(p).rm : 'غير مفعل'; const locked = p.ld ? '🔒' : '🔓'; return `<div class="pass-item"><strong>${p.id}</strong><span style="color:var(--gold);">${token}</span><small>[${p.mode}]</small><span>${locked}</span><small>${exp}</small><button class="unlock" onclick="up('${p.id}')">🔓</button><button onclick="dp('${p.id}')">🗑</button></div>`; }).join(''); }

    function refAds() { ADS = ls('kf_ads', {}); ['login', 'games', 'predict'].forEach(pl => { const bg = Object.values(ADS).filter(a => a.place === pl && a.type === 'background'); const bEl = document.getElementById((pl === 'login' ? 'loginScreenBg' : pl === 'games' ? 'gamesScreenBg' : 'predictScreenBg')); if (bEl) { if (bg.length > 0) { bEl.style.display = 'block'; bEl.style.backgroundImage = `url(${bg[bg.length-1].content})`; } else { bEl.style.display = 'none'; } } const ct = document.getElementById(pl === 'login' ? 'loginAd' : pl === 'games' ? 'gamesAd' : 'predictAd'); if (!ct) return; ct.innerHTML = ''; const vid = Object.values(ADS).filter(a => a.place === pl && a.type === 'video')[0]; if (vid) { ct.style.display = 'flex'; ct.className = 'ad-banner video-ad'; const v = document.createElement('video'); v.src = vid.content; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true; v.setAttribute('playsinline', ''); v.style.cssText = 'width:100%;height:100%;object-fit:fill;border-radius:8px;'; v.play().catch(() => {}); ct.appendChild(v); } else { const imgs = Object.values(ADS).filter(a => a.place === pl && a.type === 'image'); if (imgs.length > 0) { ct.style.display = 'flex'; ct.className = 'ad-banner image-ad'; imgs.forEach((a, i) => { const img = document.createElement('img'); img.src = a.content; img.style.cssText = 'height:200px;width:400px;object-fit:cover;border-radius:8px;position:absolute;opacity:' + (i === 0 ? '1' : '0') + ';transition:opacity 0.8s;'; ct.appendChild(img); }); } else if (pl === 'predict') { const txts = Object.values(ADS).filter(a => a.place === 'predict' && a.type === 'text'); if (txts.length > 0) { ct.style.display = 'flex'; ct.className = 'ad-banner text-ad'; ct.innerHTML = `<div class="ad-slide-text">${txts.map(a => a.content).join(' ★★★ ')}</div>`; } else { ct.style.display = 'none'; } } else { ct.style.display = 'none'; } } }); if (document.getElementById('loginScreen').classList.contains('active')) showFullscreenAd(); }
    async function addAd() { const type = document.getElementById('adType').value, place = document.getElementById('adPlace').value, content = document.getElementById('adContent').value.trim(); if (!content) return alert('أدخل المحتوى'); ADS['ad_' + Date.now()] = { id: 'ad_' + Date.now(), type, place, content }; ss('kf_ads', ADS); if (isOnline && db) db.ref('ads').set(ADS).catch(() => {}); document.getElementById('adContent').value = ''; ral(); refAds(); alert('✅'); }
    async function dad(id) { if (!confirm('حذف؟')) return; delete ADS[id]; ss('kf_ads', ADS); if (isOnline && db) db.ref('ads').set(ADS).catch(() => {}); ral(); refAds(); }
    async function daa() { if (!confirm('حذف الكل؟')) return; ADS = {}; ss('kf_ads', ADS); if (isOnline && db) db.ref('ads').set({}).catch(() => {}); ral(); refAds(); }
    function ral() { const c = document.getElementById('adListContainer'), cd = document.getElementById('adCountDisplay'); if (!c) return; ADS = ls('kf_ads', {}); const arr = Object.values(ADS); if (cd) cd.textContent = arr.length; if (!arr.length) { c.innerHTML = '<p style="color:#888;text-align:center;">📭 لا توجد</p>'; return; } const tn = { image: '🖼️ صورة', text: '📝 نص', video: '🎬 فيديو', background: '🎨 خلفية', fullscreen: '📱 ملء الشاشة' }, pn = { login: '🔐 الدخول', games: '🎮 البرامج', predict: '🎯 التوقعات' }; c.innerHTML = arr.map(a => `<div class="ad-list-item"><div><b style="color:var(--gold)">${tn[a.type]}</b><br><small>${pn[a.place]}</small><br>${a.content.substring(0,30)}</div><button onclick="dad('${a.id}')" class="btn-delete-ad">🗑️</button></div>`).join(''); }

    function loadPGL() { const s = document.getElementById('patternGameSelect'); if (s) s.innerHTML = '<option value="">اختر</option>' + Object.entries(G).map(([k, g]) => `<option value="${k}">${g.n}</option>`).join(''); }
    function loadPatterns() { const gk = document.getElementById('patternGameSelect').value, tp = document.getElementById('patternTypeSelect').value, c = document.getElementById('patternListContainer'); if (!c) return; if (!gk) { c.innerHTML = '<p style="color:#888">اختر</p>'; return; } const ap = JSON.parse(localStorage.getItem('kf_pat') || '{}')[gk] || { n: {}, v: {} }; let p = {}, t = ''; if (tp === 'normal') { p = ap.n || {}; t = '📋 عادي'; } else if (tp === 'vegOnly') { p = ap.v || {}; t = '🥬 خضار فقط'; } else { p = { ...(ap.n || {}), ...(ap.v || {}) }; t = '📊 الكل'; } const entries = Object.entries(p); if (!entries.length) { c.innerHTML = '<p style="color:#888">لا توجد</p>'; return; } c.innerHTML = `<h4 style="color:var(--gold)">${t} (${entries.length})</h4><table style="width:100%;font-size:9px;border-collapse:collapse"><tr style="color:var(--gold)"><th>#</th><th>تسلسل</th><th>نتيجة</th><th>تكرار</th><th>خضار/لحوم</th></tr>${entries.map(([k, pd], i) => { let b = null, bc = 0; for (const [s, ct] of Object.entries(pd.r || {})) { if (ct > bc) { bc = ct; b = s; } } const vc2 = pd.vc || pd.s.filter(s => gs.v.includes(s)).length; const mc2 = pd.mc || pd.s.filter(s => gs.m.includes(s)).length; const ei = pd.hm !== undefined ? (pd.hm ? '🥩' : '🥬') + ' ' + (pd.vr || '') + '%' : ''; return `<tr><td>${i+1}</td><td>${pd.s.join('→')}</td><td style="font-size:14px;">${b||'?'}</td><td>${pd.t}</td><td>🟢${vc2} 🔴${mc2} ${ei}</td></tr>`; }).join('')}</table>`; }
    async function clearPatterns() { const gk = document.getElementById('patternGameSelect').value; if (!gk) return alert('اختر'); if (!confirm('مسح؟')) return; const ap = JSON.parse(localStorage.getItem('kf_pat') || '{}'); ap[gk] = { n: {}, v: {} }; localStorage.setItem('kf_pat', JSON.stringify(ap)); if (isOnline && db) db.ref('pat/' + gk).set({ n: {}, v: {} }).catch(() => {}); loadPatterns(); }

    async function cpw() { const inp = document.getElementById('passInput').value.trim(); if (!inp) return; document.getElementById('loginError').textContent = ''; if (inp === ADMIN) { document.getElementById('passInput').value = ''; showScreen('adminScreen'); return; } let pl = ls('kf_pl', {}); if (!Object.keys(pl).length) { pl['player01'] = { id: 'player01', key: 'Khali2024', mode: 'fixed', maxHours: 0, maxDays: 0, ld: null, ca: null }; ss('kf_pl', pl); } let found = null; for (const p of Object.values(pl)) { if ([p.key + '_master', p.key + '_static', gtk(p.key, p.mode), p.key].includes(inp)) { found = p; break; } } if (!found) { document.getElementById('loginError').textContent = '❌ خطأ'; return; } if (cex(found).ex) { document.getElementById('loginError').textContent = '⏰ منتهي'; return; } if (found.ld && found.ld !== devId) { document.getElementById('loginError').textContent = '🚫 جهاز آخر'; return; } if (!found.ld) { found.ld = devId; found.ca = found.ca || new Date().toISOString(); pl[found.id] = found; ss('kf_pl', pl); if (isOnline && db) db.ref('players/' + found.id).set(found).catch(() => {}); } cu = found; document.getElementById('selectUser').textContent = '👤 ' + found.id; document.getElementById('passInput').value = ''; showScreen('gameSelectScreen'); }

    function initFB() { try { if (!firebase.apps.length) firebase.initializeApp(fc); db = firebase.database(); firebase.database().ref('.info/connected').on('value', s => { isOnline = s.val() === true; document.querySelectorAll('#connectionStatus,#adminConnStatus').forEach(el => { if (el) el.textContent = isOnline ? '🟢 متصل' : '🔴 غير متصل'; }); }); db.ref('ads').on('value', s => { if (s.val()) { ADS = s.val(); ss('kf_ads', ADS); refAds(); } }); db.ref('games').on('value', s => { if (s.val()) { G = s.val(); ss('kf_games', G); buildGC(); } }); db.ref('players').on('value', s => { if (s.val()) { ss('kf_pl', s.val()); rpl(); } }); } catch (e) {} }
    async function init() { initFB(); await buildGC(); refAds(); showFullscreenAd(); document.getElementById('passInput').addEventListener('keydown', e => { if (e.key === 'Enter') cpw(); }); 
        setInterval(() => { if (cg && isOnline) syncAllToCloud(); }, 30000);
        window.addEventListener('beforeunload', () => { if (cg) syncAllToCloud(); });
    }
    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
