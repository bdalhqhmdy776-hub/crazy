<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>👑 CRAZY 👑</title>
    <style>
        :root {
            --bg: #06060e;
            --surface: #0f0f23;
            --card: #16163a;
            --border: #252550;
            --gold: #f0a500;
            --red: #e94560;
            --green: #4e9f3d;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --orange: #f97316;
            --text: #e2e2e2;
            --muted: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Cairo', 'Arial', sans-serif;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            color: var(--text);
            position: fixed;
            top: 0;
            left: 0;
        }

        .app {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 420px;
            margin: 0 auto;
            background: transparent;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            flex: 1;
            overflow-y: auto;
            padding: 4px;
            gap: 4px;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        /* Stars Background */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), #fff);
            border-radius: 50%;
            animation: shoot 3s linear infinite;
            animation-delay: var(--sdelay);
            opacity: 0;
        }

        @keyframes shoot {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(-45deg);
            }
            5% {
                opacity: 1;
            }
            15% {
                opacity: 0;
                transform: translate(-300px, 300px) rotate(-45deg);
            }
            100% {
                opacity: 0;
                transform: translate(-300px, 300px) rotate(-45deg);
            }
        }

        /* Screen Background Overlay */
        .screen-bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            opacity: 0.15;
            transition: background-image 1s ease-in-out;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 12px 6px;
            background: rgba(22, 22, 58, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 20px;
            color: var(--red);
            margin: 0;
        }

        .header.admin-h {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(240, 165, 0, 0.3);
        }

        .header.admin-h h1 {
            color: var(--gold);
        }

        /* Buttons */
        .btn {
            background: var(--red);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            flex-shrink: 0;
            transition: all 0.2s;
            position: relative;
            z-index: 1;
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.85;
        }

        .btn.sm {
            padding: 8px 14px;
            font-size: 11px;
            width: auto;
            border-radius: 14px;
        }

        .btn.gold {
            background: linear-gradient(135deg, #f0a500, #d49400);
            color: #000;
        }

        .btn.outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        .btn.cyan {
            background: var(--cyan);
            color: #000;
        }

        .btn.danger {
            background: #b91c1c;
        }

        .btn.purple {
            background: var(--purple);
            color: #fff;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .btn-row .btn {
            flex: 1;
        }

        /* Inputs */
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            background: rgba(22, 22, 58, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 10px;
            text-align: center;
            outline: none;
            font-family: inherit;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        textarea {
            text-align: right;
            min-height: 60px;
            resize: vertical;
        }

        .status-msg {
            text-align: center;
            font-size: 10px;
            padding: 3px;
            border-radius: 6px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .status-msg.online {
            color: #4e9f3d;
            background: rgba(5, 26, 5, 0.7);
        }

        .status-msg.offline {
            color: #ff6b6b;
            background: rgba(26, 5, 5, 0.7);
        }

        /* Ad Banners */
        .ad-banner {
            width: 100%;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            border-radius: 8px;
            background: rgba(22, 22, 58, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .ad-banner.image-ad {
            height: 200px;
        }

        .ad-banner.text-ad {
            height: 25px;
            min-height: 25px;
        }

        .ad-slide-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .ad-slide-image img {
            height: 200px;
            width: 400px;
            object-fit: cover;
            border-radius: 8px;
            position: absolute;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .ad-slide-image img.active {
            opacity: 1;
        }

        .ad-slide-text {
            white-space: nowrap;
            animation: marqueeRTL 14s linear infinite;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px rgba(240, 165, 0, 0.8);
            padding: 0 10px;
            line-height: 25px;
        }

        @keyframes marqueeRTL {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        /* Gear Icon Button */
        .gear-icon-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gold);
            color: #000;
            font-size: 22px;
            border: none;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px rgba(240, 165, 0, 0.5);
            transition: all 0.2s;
        }

        .gear-icon-btn:active {
            transform: scale(0.9);
        }

        /* Gear Popup */
        .gear-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 99;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .gear-popup-overlay.show {
            display: flex;
        }

        .gear-popup {
            background: rgba(22, 22, 58, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 200px;
            text-align: center;
        }

        .gear-popup h3 {
            color: var(--gold);
            font-size: 16px;
            margin: 0;
        }

        .gear-popup-options {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .gear-popup-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .gear-popup-option.active {
            background: var(--gold);
            color: #000;
        }

        .gear-popup-option:active {
            transform: scale(0.9);
        }

        /* Wheel */
        .wheel-container {
            position: relative;
            width: 390px;
            height: 390px;
            margin: 0 auto;
            flex-shrink: 0;
            z-index: 1;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(240, 165, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: #000;
            z-index: 2;
            box-shadow: 0 0 25px rgba(240, 165, 0, 0.7);
            overflow: hidden;
        }

        .wheel-center img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .wheel-slot {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            cursor: pointer;
            background: rgba(22, 22, 58, 0.8);
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            z-index: 1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            flex-direction: column;
            gap: 1px;
        }

        .wheel-slot:active {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 20px rgba(240, 165, 0, 0.6);
            z-index: 3;
        }

        .wheel-slot.veg {
            box-shadow: 0 0 12px rgba(78, 159, 61, 0.4);
        }

        .wheel-slot.meat {
            box-shadow: 0 0 12px rgba(233, 69, 96, 0.4);
        }

        .wheel-slot.pred-top {
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.9);
            animation: pulse-evil 0.8s infinite;
            background: rgba(40, 10, 10, 0.9);
        }

        .wheel-slot.pred-mid {
            box-shadow: 0 0 18px rgba(255, 140, 0, 0.7);
            background: rgba(40, 25, 5, 0.85);
        }

        .wheel-slot.pred-none {
            opacity: 0.45;
            box-shadow: none;
            background: rgba(22, 22, 58, 0.5);
        }

        @keyframes pulse-evil {
            0%,
            100% {
                box-shadow: 0 0 18px rgba(255, 0, 0, 0.7);
            }
            50% {
                box-shadow: 0 0 35px rgba(255, 0, 0, 1);
            }
        }

        .slot-badge {
            font-size: 20px;
            line-height: 1;
            margin-top: 1px;
        }

        .slot-prob {
            font-size: 9px;
            color: var(--gold);
            font-weight: bold;
        }

        /* Gear Strip */
        .gear-strip {
            background: rgba(2, 2, 8, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px;
            display: flex;
            gap: 3px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 38px;
            align-items: center;
            flex-shrink: 0;
            margin-top: auto;
            z-index: 1;
        }

        .gear-slot {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            background: rgba(10, 10, 34, 0.7);
            border: 1px solid rgba(42, 42, 74, 0.5);
        }

        .gear-slot.newest {
            border-color: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }

        /* Counter Box */
        .counter-box {
            display: flex;
            justify-content: space-around;
            background: rgba(22, 22, 58, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            text-align: center;
            z-index: 1;
        }

        .counter-value {
            font-size: 20px;
            font-weight: bold;
        }

        .counter-value.correct {
            color: var(--green);
        }

        .counter-value.wrong {
            color: var(--red);
        }

        .counter-label {
            font-size: 10px;
            color: var(--muted);
        }

        .counter-percent {
            font-size: 14px;
            font-weight: bold;
            color: var(--gold);
        }

        /* Game Cards */
        .game-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .game-card {
            background: rgba(22, 22, 58, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .game-card:active {
            transform: scale(0.95);
            border-color: var(--gold);
        }

        .game-card h3 {
            font-size: 14px;
            color: var(--gold);
            margin: 0;
        }

        .game-card .game-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sections */
        .section {
            background: rgba(22, 22, 58, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .section h3 {
            font-size: 14px;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .row label {
            font-size: 10px;
            color: var(--muted);
            min-width: 60px;
        }

        .row input,
        .row select,
        .row textarea {
            flex: 1;
            min-width: 70px;
            padding: 8px;
            font-size: 12px;
        }

        /* Lists */
        .pass-list {
            max-height: 200px;
            overflow-y: auto;
            font-size: 9px;
            font-family: monospace;
        }

        .pass-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            border-bottom: 1px solid rgba(26, 26, 58, 0.5);
            gap: 4px;
            font-size: 9px;
        }

        .pass-item button {
            background: #b91c1c;
            color: #fff;
            border: none;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 8px;
            cursor: pointer;
        }

        .game-list-item,
        .ad-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(10, 10, 40, 0.7);
            border-radius: 8px;
            margin-bottom: 5px;
            gap: 8px;
            font-size: 10px;
        }

        .game-list-item .game-list-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            font-size: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-list-item .game-list-info,
        .ad-list-item .ad-list-info {
            flex: 1;
            text-align: right;
        }

        .game-list-item .game-list-name {
            color: var(--gold);
            font-weight: bold;
        }

        .game-list-item button,
        .ad-list-item button {
            background: #b91c1c;
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 9px;
            cursor: pointer;
            margin: 1px;
        }

        .game-list-item button.edit {
            background: var(--purple);
        }

        /* Learn Log */
        .learn-log {
            font-size: 9px;
            color: var(--muted);
            font-family: monospace;
            background: rgba(2, 2, 8, 0.7);
            padding: 8px;
            border-radius: 8px;
            line-height: 1.5;
            flex-shrink: 0;
            max-height: 45px;
            overflow-y: auto;
            z-index: 1;
        }

        .learn-log div {
            padding: 2px 0;
            border-bottom: 1px solid rgba(17, 17, 17, 0.5);
        }

        .spacer {
            flex: 1;
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            font-size: 12px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        /* Alerts */
        .alert {
            display: none;
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .alert.show {
            display: block;
        }

        .alert-info {
            background: rgba(5, 26, 26, 0.7);
            border: 2px solid var(--cyan);
            color: var(--cyan);
        }

        .alert-cloud {
            background: rgba(5, 5, 30, 0.8);
            border: 2px solid #f0a500;
            color: #f0a500;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .tabs .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: rgba(22, 22, 58, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            color: var(--muted);
            transition: all 0.2s;
        }

        .tabs .tab.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: var(--purple);
            color: #fff;
            font-weight: bold;
        }

        .admin-tabs {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .admin-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: rgba(22, 22, 58, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            color: var(--muted);
            transition: all 0.2s;
        }

        .admin-tab.active {
            background: rgba(240, 165, 0, 0.3);
            border-color: var(--gold);
            color: #fff;
            font-weight: bold;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 2px;
        }

        /* Game screen specific layout */
        #gameScreen {
            gap: 3px;
            padding: 2px;
        }
    </style>
</head>
<body>
    <div class="stars-bg" id="starsBg"></div>
    <div class="app" id="appRoot">
        <!-- Login Screen -->
        <div class="screen active" id="loginScreen">
            <div class="screen-bg-overlay" id="loginScreenBg"></div>
            <div class="ad-banner image-ad" id="loginAd" style="display:none;">
                <div class="ad-slide-image" id="loginAdSlide"></div>
            </div>
            <div class="spacer"></div>
            <div class="header"><h1>👑 CRAZY 👑</h1></div>
            <div class="status-msg online" id="connectionStatus">🟡</div>
            <div style="display:flex;flex-direction:column;gap:10px;flex-shrink:0;">
                <input type="password" id="passInput" placeholder="🔐 كلمة المرور" maxlength="30" autocomplete="off">
                <button class="btn" id="loginBtn" onclick="cpw()">🔓 دخول</button>
                <p class="error-msg" id="loginError"></p>
            </div>
            <div class="spacer"></div>
        </div>

        <!-- Game Select Screen -->
        <div class="screen" id="gameSelectScreen">
            <div class="screen-bg-overlay" id="gamesScreenBg"></div>
            <div class="ad-banner image-ad" id="gamesAd" style="display:none;">
                <div class="ad-slide-image" id="gamesAdSlide"></div>
            </div>
            <div class="header"><h1>🎮 اختر اللعبة</h1><div style="font-size:9px;color:var(--muted);" id="selectUser"></div></div>

let imageAdIntervals = {};

function startImageAdRotation(bannerId, slideId, place) {
    if (imageAdIntervals[place]) {
        clearInterval(imageAdIntervals[place]);
    }

    const banner = document.getElementById(bannerId);
    const slide = document.getElementById(slideId);
    if (!banner || !slide) return;

    const adsForPlace = Object.values(ADS).filter(a => a.place === place && a.type === 'image');
    
    if (adsForPlace.length === 0) {
        banner.style.display = 'none';
        return;
    }

    banner.style.display = 'flex';
    
    slide.innerHTML = '';
    adsForPlace.forEach((ad, index) => {
        const img = document.createElement('img');
        img.src = ad.content;
        img.alt = 'إعلان';
        img.onerror = function() { this.style.display = 'none'; };
        if (index === 0) img.classList.add('active');
        slide.appendChild(img);
    });

    if (adsForPlace.length === 1) {
        slide.querySelector('img').classList.add('active');
        return;
    }

    let currentIndex = 0;
    imageAdIntervals[place] = setInterval(() => {
        const images = slide.querySelectorAll('img');
        if (images.length === 0) return;
        
        images[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % images.length;
        images[currentIndex].classList.add('active');
    }, 3000);
}

function startBackgroundRotation(screenId, bgElementId, place) {
    if (bgIntervals[place]) {
        clearInterval(bgIntervals[place]);
    }

    const screen = document.getElementById(screenId);
    const bgElement = document.getElementById(bgElementId);
    if (!screen || !bgElement) return;

    const bgAds = Object.values(ADS).filter(a => a.place === place && a.type === 'bg');
    
    if (bgAds.length === 0) {
        bgElement.style.backgroundImage = '';
        bgElement.style.display = 'none';
        return;
    }

    bgElement.style.display = 'block';

    if (bgAds.length === 1) {
        bgElement.style.backgroundImage = `url(${bgAds[0].content})`;
        return;
    }

    let currentBgIndex = 0;
    bgElement.style.backgroundImage = `url(${bgAds[currentBgIndex].content})`;

    bgIntervals[place] = setInterval(() => {
        currentBgIndex = (currentBgIndex + 1) % bgAds.length;

    }, 3000);
}

function gtp(b, m) {
    const n = new Date();
    const p = v => ('' + v).padStart(2, '0');
    if (m === 'hour') return `${b}_${n.getFullYear()}${p(n.getMonth()+1)}${p(n.getDate())}${p(n.getHours())}`;
    if (m === 'day') return `${b}_${n.getFullYear()}${p(n.getMonth()+1)}${p(n.getDate())}`;
    if (m === 'month') return `${b}_${n.getFullYear()}${p(n.getMonth()+1)}`;
    return `${b}_static`;
}

function gex(pe) {
    if (!pe.createdAt) return { ex: false, rm: 'غير محدود' };
    const cr = new Date(pe.createdAt);
    const nw = new Date();
    let mh = Infinity;
    if (pe.maxHours > 0) mh = pe.maxHours;
    if (pe.maxDays > 0) mh = Math.min(mh, pe.maxDays * 24);
    if (mh === Infinity) return { ex: false, rm: 'غير محدود' };
    const rm = new Date(cr.getTime() + mh * 3600000) - nw;
    if (rm <= 0) return { ex: true, rm: 'منتهي' };
    const rh = Math.floor(rm / 3600000);
    return { ex: false, rm: rh > 23 ? Math.floor(rh / 24) + ' يوم' : rh + ' ساعة' };
}

const dfp = () => {
    const c = [navigator.userAgent || '', screen.width + '', new Date().getTimezoneOffset() + ''].join('|');
    let h = 0;
    for (let i = 0; i < c.length; i++) h = ((h << 5) - h) + c.charCodeAt(i);
    return 'D' + Math.abs(h).toString(36).toUpperCase();
};

function mergeLearning(localLp, localDp, cloudData) {
    if (!cloudData) return { lp: localLp, dp: localDp };
    const mergedLp = { ...localLp };
    const mergedDp = { ...localDp };
    if (cloudData.patterns) {
        for (const [k, v] of Object.entries(cloudData.patterns)) {
            mergedLp[k] = Math.max(mergedLp[k] || 0, v);
        }
    }
    if (cloudData.discovered) {
        for (const [k, v] of Object.entries(cloudData.discovered)) {
            if (!mergedDp[k] || v.confidence > mergedDp[k].confidence) {
                mergedDp[k] = v;
            }
        }
    }
    return { lp: mergedLp, dp: mergedDp };
}

async function saveGame() {
    const editKey = document.getElementById('editGameKey').value;
    const key = document.getElementById('gameKey').value.trim().toLowerCase();
    const name = document.getElementById('gameName').value.trim();
    const img = document.getElementById('gameImage').value.trim();
    const vegRaw = document.getElementById('gameVeg').value.trim();
    const meatRaw = document.getElementById('gameMeat').value.trim();
    const clockRaw = document.getElementById('gameClock').value.trim();

    if (!key || !name) return alert('المفتاح والاسم مطلوبين');
    if (!/^[a-z0-9_]+$/.test(key)) return alert('المفتاح: حروف إنجليزية وأرقام فقط');

    const veg = vegRaw.split(/[,،\s]+/).filter(Boolean);
    const meat = meatRaw.split(/[,،\s]+/).filter(Boolean);

    if (veg.length < 2 || meat.length < 2) return alert('أدخل رمزين على الأقل لكل من الخضار واللحوم');

    let clock = [];
    const clockLines = clockRaw.split('\n').filter(Boolean);
    if (clockLines.length === 8) {
        clock = clockLines.map(line => {
            const parts = line.split(/[:：]\s*/);
            return parts[parts.length - 1].trim();
        });
    } else {
        clock = [...veg, ...meat].slice(0, 8);
    }

    const a = [...veg, ...meat];
    const gameData = { n: name, v: veg, m: meat, a, clock, img };

    if (editKey && editKey !== key) delete G[editKey];
    G[key] = gameData;
    saveGames(G);

    await buildGameCards();
    cancelEdit();
    alert('✅ تم حفظ ' + name);
}

async function sg(gk) {

            const snap = await db.ref('games').once('value');

    cloudSynced = false;

    dp = ls(PK + gk + '_d', {});

        const cloudData = await downloadLearning(gk);
        if (cloudData && (Object.keys(cloudData.patterns || {}).length > 0 || Object.keys(cloudData.discovered || {}).length > 0)) {
            const merged = mergeLearning(lp, dp, cloudData);
            lp = merged.lp;
            dp = merged.dp;
            ss(PK + gk + '_p', lp);
            ss(PK + gk + '_d', dp);
            cloudSynced = true;
            alog('☁️ تم تحميل التعلم المشترك');
        }
    }

    fh = ls(PK + gk + '_h', []);
    cc = parseInt(localStorage.getItem(PK + gk + '_c') || '0');
    wc = parseInt(localStorage.getItem(PK + gk + '_w') || '0');
    predCount = parseInt(localStorage.getItem(PK + gk + '_pc') || '5');

    gs = [];
    las = null;
    al = [];

    gs.push(s);
    las = s;

    ra();
    alog('🟢 بدأ ' + g.n);
}

function gfr(sym) {
    return (BR[sym] || []).filter(s => cA.includes(s));
}

function gfrp(sym, cnt) {
    return RR[sym]?.[cnt]?.filter(s => cA.includes(s)) || [];
}

function uc_() {
    document.getElementById('correctCount').textContent = cc;
    document.getElementById('wrongCount').textContent = wc;
    const total = cc + wc;
    document.getElementById('percentDisplay').textContent = total > 0 ? Math.round((cc / total) * 100) + '%' : '0%';
}

async function lrn(f, t) {
    const k = f + '>' + t;
    lp[k] = (lp[k] || 0) + 1;
    ss(PK + cg + '_p', lp);

    if (!gfr(f).includes(t) && lp[k] >= 2 && !dp[k]) {
        dp[k] = { count: lp[k], confidence: Math.min(lp[k] * 15, 90) };
        ss(PK + cg + '_d', dp);
        document.getElementById('learnAlert').textContent = '🧠 اكتشاف: ' + f + ' → ' + t;
        document.getElementById('learnAlert').classList.add('show');
        setTimeout(() => document.getElementById('learnAlert').classList.remove('show'), 3000);
        alog('🆕 ' + f + '→' + t + ' (' + dp[k].confidence + '%)');
    }

    if (dp[k]) {
        dp[k].count = lp[k];
        dp[k].confidence = Math.min(lp[k] * 15, 95);
        ss(PK + cg + '_d', dp);
    }

    if (on && db && lp[k] % 5 === 0) {
        const uploaded = await uploadLearning(cg, lp, dp);
        if (uploaded) {
            const cloudAlert = document.getElementById('cloudAlert');
            cloudAlert.style.display = 'block';
            setTimeout(() => cloudAlert.style.display = 'none', 2000);
            alog('☁️ رفع للسحابة');
        }
    }
}

function gco(strip, sym) {
    if (!sym || !strip.length) return 0;
    let c = 0;
    for (let i = strip.length - 1; i >= 0; i--) {
        if (strip[i] === sym) c++;
        else break;
    }
    return c;
}

function ans(strip) {
    if (strip.length < 1) return { pred: null, conf: 0, forced: [], src: [] };

    const last = strip[strip.length - 1];
    const cons = gco(strip, last);
    const res = { last, cons, pred: null, conf: 0, forced: [], src: [] };

    if (cons >= 2) {
        const rp = gfrp(last, Math.min(cons, 4));
        if (rp.length > 0) {
            res.forced = [...rp];
            res.pred = rp[0];
            res.conf = 70 + cons * 5;
            res.src.push('تكرار');
        }
    }

    const lr = [];
    for (const [k, c] of Object.entries(lp)) {
        if (k.startsWith(last + '>') && c >= 2) {
            lr.push({ sym: k.split('>')[1], count: c });
        }
    }
    lr.sort((a, b) => b.count - a.count);

    if (!res.pred && lr[0]?.count >= 3) {
        res.pred = lr[0].sym;
        res.conf = 40 + lr[0].count * 3;
        res.src.push('متعلم');
        res.forced = [...new Set([...res.forced, ...lr.slice(0, 3).map(l => l.sym)])];
    }

    if (!res.pred) {
        const disc = [];
        for (const [k, d] of Object.entries(dp)) {
            if (k.startsWith(last + '>') && d.confidence >= 40) {
                disc.push({ sym: k.split('>')[1], conf: d.confidence });
            }
        }
        disc.sort((a, b) => b.conf - a.conf);
        if (disc[0]?.conf >= 50) {
            res.pred = disc[0].sym;
            res.conf = disc[0].conf;
            res.src.push('مكتشف');
            if (!res.forced.includes(disc[0].sym)) res.forced.push(disc[0].sym);
        }
    }

    if (!res.pred && TR[last]) {
        const t = TR[last];
        if (cA.includes(t.d)) {
            if (!res.forced.includes(t.d)) res.forced.push(t.d);
            res.pred = t.d;
            res.conf = 45;
            res.src.push('محفز');
        }
    }

    if (!res.pred) {
        const bn = gfr(last);
        if (bn.length > 0) {
            res.pred = bn[0];
            res.conf = 30;
            res.src.push('طبيعي');
            if (!res.forced.length) res.forced = bn;
        }
    }

    return res;
}

function addSymbol(sym) {
    if (cu && gex(cu).ex) { alert('⏰ انتهت الصلاحية'); lo(); return; }

    if (gs.length > 0) {
        const a = ans(gs);
        const preds = gpr();
        const ps = preds.map(p => p.emoji);
        ps.includes(sym) ? cc++ : wc++;
        localStorage.setItem(PK + cg + '_c', cc);
        localStorage.setItem(PK + cg + '_w', wc);
        uc_();
        lrn(gs[gs.length - 1], sym);
    }

    fh.push(sym);
    if (fh.length > 500) fh = fh.slice(-250);
    ss(PK + cg + '_h', fh);

    gs.push(sym);
    if (gs.length > MS) gs.shift();
    las = sym;

    if (fh.length % 50 === 0) alog('📈 50 | ✅' + cc + ' ❌' + wc);
    alog('➕ ' + sym);
    ra();
}

function rg() {
    gs = [];
    las = null;
    cc = 0;
    wc = 0;
    localStorage.setItem(PK + cg + '_c', '0');
    localStorage.setItem(PK + cg + '_w', '0');
    uc_();
    gs.push(cV[Math.floor(Math.random() * cV.length)]);
    las = gs[0];
    alog('🔄 إعادة تعيين');
    ra();
}

function gpr() {
    const halfVeg = Math.ceil(predCount / 2);
    const halfMeat = predCount - halfVeg;

    if (gs.length === 0) {
        const def = [];
        for (let i = 0; i < halfVeg; i++) def.push({ emoji: cV[i] || cA[0] || '🥕', prob: 35, type: 'veg', forced: false, learned: false, last: false });
        for (let i = 0; i < halfMeat; i++) def.push({ emoji: cM[i] || cA[cV.length] || '🍤', prob: 25, type: 'meat', forced: false, learned: false, last: false });
        return def;
    }

    const a = ans(gs);
    const preds = [];
    const used = new Set();
    let vc = 0, mc = 0;
    const maxVeg = halfVeg, maxMeat = halfMeat;

    const add = (sym, prob, forced, learned) => {
        if (used.has(sym) || !cA.includes(sym)) return;
        const t = cV.includes(sym) ? 'veg' : 'meat';
        if (t === 'veg' && vc >= maxVeg) return;
        if (t === 'meat' && mc >= maxMeat) return;
        preds.push({ emoji: sym, prob: Math.round(Math.min(prob, 95)), type: t, forced, learned, last: sym === las });
        used.add(sym);
        if (t === 'veg') vc++; else mc++;
    };

    for (const s of a.forced) add(s, a.conf + 20, true, a.src.includes('متعلم'));
    if (!used.has(las)) add(las, 35, false, false);
    const bn = gfr(a.last);
    for (const s of bn) { if (!used.has(s)) add(s, 25, false, false); }
    for (const s of cA) { if (!used.has(s)) add(s, 15, false, false); }

    preds.sort((a2, b2) => {
        if (a2.last !== b2.last) return a2.last ? -1 : 1;
        if (a2.forced !== b2.forced) return a2.forced ? -1 : 1;
        return b2.prob - a2.prob;
    });

    return preds.slice(0, predCount);
}

function buildWheel(preds) {
    const container = document.getElementById('wheelContainer');
    container.querySelectorAll('.wheel-slot').forEach(el => el.remove());

    const oldBtn = container.querySelector('.gear-icon-btn');
    if (oldBtn) oldBtn.remove();

    const radius = 145;
    const centerX = 195;
    const centerY = 195;

    const topPredEmojis = preds.slice(0, predCount).map(p => p.emoji);
    const topPredMap = {};
    preds.slice(0, predCount).forEach((p, i) => { topPredMap[p.emoji] = { prob: p.prob, rank: i }; });

    const allItems = cClock.map((emoji, i) => {
        const isPred = topPredEmojis.includes(emoji);
        const predInfo = topPredMap[emoji];
        return {
            emoji,
            type: cV.includes(emoji) ? 'veg' : 'meat',
            isPred,
            rank: predInfo ? predInfo.rank : -1,
            prob: predInfo ? predInfo.prob : 0
        };
    });

    const angleStep = 360 / allItems.length;

    allItems.forEach((item, i) => {
        const angleDeg = -90 + (i * angleStep);
        const angleRad = (angleDeg * Math.PI) / 180;
        const x = centerX + radius * Math.cos(angleRad);
        const y = centerY + radius * Math.sin(angleRad);

        const slot = document.createElement('div');
        slot.className = 'wheel-slot ' + item.type;

        if (item.isPred) {
            if (item.rank < 2) {
                slot.classList.add('pred-top');
                slot.innerHTML = `<span style="font-size:38px;">${item.emoji}</span><span class="slot-badge">👹</span><span class="slot-prob">${item.prob}%</span>`;
            } else {
                slot.classList.add('pred-mid');
                slot.innerHTML = `<span style="font-size:38px;">${item.emoji}</span><span class="slot-badge">😈</span><span class="slot-prob">${item.prob}%</span>`;
            }
        } else {
            slot.classList.add('pred-none');
            slot.innerHTML = `<span style="font-size:38px;">${item.emoji}</span>`;
        }

        slot.style.left = x + 'px';
        slot.style.top = y + 'px';
        slot.title = item.isPred ? (item.rank < 2 ? '👹 ' : '😈 ') + item.prob + '%' : item.emoji;
        slot.onclick = () => addSymbol(item.emoji);

        container.appendChild(slot);
    });

    const centerEl = document.getElementById('wheelCenter');
    const g = G[cg];
    if (g && g.img && g.img.startsWith('http')) {
        centerEl.innerHTML = `<img src="${g.img}" alt="${g.n}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    } else if (g && g.img) {
        centerEl.textContent = g.img;
    } else {
        centerEl.textContent = las || '🎯';
    }

    const gearBtn = document.createElement('button');
    gearBtn.className = 'gear-icon-btn';
    gearBtn.textContent = '⚙️';
    gearBtn.onclick = toggleGearPopup;
    container.appendChild(gearBtn);
}

async function showScreen(id) {
    // Clear all intervals when leaving screens
    Object.keys(imageAdIntervals).forEach(key => {
        if (imageAdIntervals[key]) {
            clearInterval(imageAdIntervals[key]);
            delete imageAdIntervals[key];
        }
    });
    
    Object.keys(bgIntervals).forEach(key => {
        if (bgIntervals[key]) {
            clearInterval(bgIntervals[key]);
            delete bgIntervals[key];
        }
    });

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const sc = document.getElementById(id);

    if (sc) {
        sc.classList.add('active');

        if (id === 'adminScreen') {
            await lap();
            refreshGameList();
            refreshAdList();
        }

        if (id === 'gameSelectScreen') {
            await buildGameCards();
        }
    }

    refreshAllAds();
}
