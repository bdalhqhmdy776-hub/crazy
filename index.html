<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>👑 CRAZY 👑</title>
    <style>
        :root {
            --bg: #06060e;
            --surface: #0f0f23;
            --card: #16163a;
            --border: #252550;
            --gold: #f0a500;
            --red: #e94560;
            --green: #4e9f3d;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --orange: #f97316;
            --text: #e2e2e2;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden; background: #000;
            font-family: 'Cairo', 'Arial', sans-serif; touch-action: manipulation;
            user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
            color: var(--text); position: fixed; top: 0; left: 0;
        }
        .app {
            width: 100vw; height: 100vh; height: 100dvh; max-width: 420px; margin: 0 auto;
            background: transparent; display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .screen {
            display: none; flex-direction: column; width: 100%; height: 100%; flex: 1;
            overflow-y: auto; padding: 8px; gap: 5px; -webkit-overflow-scrolling: touch;
            position: relative; z-index: 1;
        }
        .screen.active { display: flex; }
        .stars-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay); opacity: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        .shooting-star {
            position: absolute; width: 2px; height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), #fff); border-radius: 50%;
            animation: shoot 3s linear infinite; animation-delay: var(--sdelay); opacity: 0;
        }
        @keyframes shoot {
            0% { opacity: 0; transform: translate(0, 0) rotate(-45deg); }
            5% { opacity: 1; }
            15% { opacity: 0; transform: translate(-300px, 300px) rotate(-45deg); }
            100% { opacity: 0; transform: translate(-300px, 300px) rotate(-45deg); }
        }
        .header {
            text-align: center; padding: 10px 6px; background: rgba(22, 22, 58, 0.7);
            backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
        }
        .header h1 { font-size: 18px; color: var(--red); margin: 0; }
        .header.admin-h { border-color: var(--gold); box-shadow: 0 0 20px rgba(240, 165, 0, 0.3); }
        .header.admin-h h1 { color: var(--gold); }
        .game-header-mini { text-align: center; padding: 6px; font-size: 10px; color: var(--muted); flex-shrink: 0; }
        .btn {
            background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 20px;
            font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; font-family: inherit; flex-shrink: 0;
        }
        .btn:active { transform: scale(0.96); opacity: 0.85; }
        .btn.sm { padding: 6px 12px; font-size: 11px; width: auto; border-radius: 14px; }
        .btn.gold { background: linear-gradient(135deg, #f0a500, #d49400); color: #000; }
        .btn.outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn.cyan { background: var(--cyan); color: #000; }
        .btn.danger { background: #b91c1c; }
        .btn.purple { background: var(--purple); color: #fff; }
        .btn-row { display: flex; gap: 5px; flex-shrink: 0; }
        .btn-row .btn { flex: 1; }
        input, select, textarea {
            width: 100%; padding: 12px; font-size: 14px; background: rgba(22, 22, 58, 0.7);
            backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); color: #fff;
            border-radius: 10px; text-align: center; outline: none; font-family: inherit; flex-shrink: 0;
        }
        textarea { text-align: right; min-height: 60px; resize: vertical; }
        .status-msg { text-align: center; font-size: 10px; padding: 3px; border-radius: 6px; flex-shrink: 0; }
        .status-msg.online { color: #4e9f3d; background: rgba(5, 26, 5, 0.7); }
        .status-msg.offline { color: #ff6b6b; background: rgba(26, 5, 5, 0.7); }
        .pred-count-selector {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(22, 22, 58, 0.7); backdrop-filter: blur(10px); border-radius: 10px;
            padding: 6px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
        }
        .pred-count-selector span { font-size: 12px; color: var(--gold); font-weight: bold; }
        .count-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--gold);
            background: transparent; color: var(--gold); font-size: 16px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .count-btn:active { background: var(--gold); color: #000; }
        .count-value { font-size: 18px; font-weight: bold; color: #fff; min-width: 24px; text-align: center; }
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 5px auto; flex-shrink: 0; }
        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; border-radius: 50%; background: rgba(240, 165, 0, 0.9);
            display: flex; align-items: center; justify-content: center; font-size: 36px;
            font-weight: bold; color: #000; z-index: 2; box-shadow: 0 0 25px rgba(240, 165, 0, 0.7); overflow: hidden;
        }
        .wheel-center img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .wheel-slot {
            position: absolute; width: 75px; height: 75px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            cursor: pointer; background: rgba(22, 22, 58, 0.8); backdrop-filter: blur(5px);
            transition: all 0.2s; z-index: 1; top: 50%; left: 50%; transform: translate(-50%, -50%);
            flex-direction: column; gap: 1px;
        }
        .wheel-slot:active { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 20px rgba(240, 165, 0, 0.6); z-index: 3; }
        .wheel-slot.veg { box-shadow: 0 0 12px rgba(78, 159, 61, 0.4); }
        .wheel-slot.meat { box-shadow: 0 0 12px rgba(233, 69, 96, 0.4); }
        .wheel-slot.pred-top { box-shadow: 0 0 25px rgba(255, 0, 0, 0.9); animation: pulse-evil 0.8s infinite; background: rgba(40, 10, 10, 0.9); }
        .wheel-slot.pred-mid { box-shadow: 0 0 18px rgba(255, 140, 0, 0.7); background: rgba(40, 25, 5, 0.85); }
        .wheel-slot.pred-none { opacity: 0.45; box-shadow: none; background: rgba(22, 22, 58, 0.5); }
        @keyframes pulse-evil {
            0%, 100% { box-shadow: 0 0 18px rgba(255, 0, 0, 0.7); }
            50% { box-shadow: 0 0 35px rgba(255, 0, 0, 1); }
        }
        .slot-badge { font-size: 24px; line-height: 1; margin-top: 2px; }
        .slot-prob { font-size: 10px; color: var(--gold); font-weight: bold; }
        .gear-strip {
            background: rgba(2, 2, 8, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 6px; display: flex; gap: 3px; justify-content: center;
            flex-wrap: wrap; min-height: 38px; align-items: center; flex-shrink: 0;
        }
        .gear-slot {
            width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center;
            justify-content: center; font-size: 15px; background: rgba(10, 10, 34, 0.7); border: 1px solid rgba(42, 42, 74, 0.5);
        }
        .gear-slot.newest { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .counter-box {
            display: flex; justify-content: space-around; background: rgba(22, 22, 58, 0.7);
            backdrop-filter: blur(10px); border-radius: 10px; padding: 6px;
            border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; text-align: center;
        }
        .counter-value { font-size: 18px; font-weight: bold; }
        .counter-value.correct { color: var(--green); }
        .counter-value.wrong { color: var(--red); }
        .counter-label { font-size: 9px; color: var(--muted); }
        .counter-percent { font-size: 12px; font-weight: bold; color: var(--gold); }
        .game-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .game-card {
            background: rgba(22, 22, 58, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 6px;
            text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .game-card:active { transform: scale(0.95); border-color: var(--gold); }
        .game-card h3 { font-size: 13px; color: var(--gold); }
        .game-card .game-emojis { font-size: 18px; }
        .game-card .game-icon { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .section {
            background: rgba(22, 22, 58, 0.7); backdrop-filter: blur(10px); border-radius: 10px;
            padding: 8px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
        }
        .section h3 { font-size: 13px; color: var(--gold); margin-bottom: 6px; }
        .row { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; flex-wrap: wrap; }
        .row label { font-size: 10px; color: var(--muted); min-width: 55px; }
        .row input, .row select, .row textarea { flex: 1; min-width: 70px; padding: 7px; font-size: 11px; }
        .pass-list { max-height: 160px; overflow-y: auto; font-size: 9px; font-family: monospace; }
        .pass-item {
            display: flex; justify-content: space-between; align-items: center; padding: 4px;
            border-bottom: 1px solid rgba(26, 26, 58, 0.5); gap: 3px; font-size: 8px;
        }
        .pass-item button { background: #b91c1c; color: #fff; border: none; padding: 2px 5px; border-radius: 4px; font-size: 8px; cursor: pointer; }
        .game-list-item {
            display: flex; justify-content: space-between; align-items: center; padding: 6px 8px;
            background: rgba(10, 10, 40, 0.7); border-radius: 8px; margin-bottom: 4px; gap: 6px; font-size: 10px;
        }
        .game-list-item .game-list-icon { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .game-list-item .game-list-info { flex: 1; text-align: right; }
        .game-list-item .game-list-name { color: var(--gold); font-weight: bold; }
        .game-list-item button { background: #b91c1c; color: #fff; border: none; padding: 3px 6px; border-radius: 4px; font-size: 8px; cursor: pointer; margin: 1px; }
        .game-list-item button.edit { background: var(--purple); }
        .learn-log {
            font-size: 9px; color: var(--muted); font-family: monospace; background: rgba(2, 2, 8, 0.7);
            padding: 6px; border-radius: 8px; line-height: 1.4; flex-shrink: 0; max-height: 50px; overflow-y: auto;
        }
        .learn-log div { padding: 1px 0; border-bottom: 1px solid rgba(17, 17, 17, 0.5); }
        .spacer { flex: 1; }
        .error-msg { color: #ff6b6b; text-align: center; font-size: 12px; flex-shrink: 0; }
        .alert { display: none; border-radius: 10px; padding: 6px; text-align: center; font-size: 11px; font-weight: bold; flex-shrink: 0; }
        .alert.show { display: block; }
        .alert-info { background: rgba(5, 26, 26, 0.7); border: 2px solid var(--cyan); color: var(--cyan); }
        .alert-cloud { background: rgba(5, 5, 30, 0.8); border: 2px solid #f0a500; color: #f0a500; }
        .tabs { display: flex; gap: 4px; flex-shrink: 0; }
        .tabs .tab {
            flex: 1; padding: 8px; text-align: center; background: rgba(22, 22, 58, 0.5);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--muted);
        }
        .tabs .tab.active { background: rgba(139, 92, 246, 0.3); border-color: var(--purple); color: #fff; font-weight: bold; }
        .admin-tabs { display: flex; gap: 4px; flex-shrink: 0; margin-bottom: 5px; }
        .admin-tab {
            flex: 1; padding: 8px; text-align: center; background: rgba(22, 22, 58, 0.5);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--muted);
        }
        .admin-tab.active { background: rgba(240, 165, 0, 0.3); border-color: var(--gold); color: #fff; font-weight: bold; }
    </style>
</head>

<script>
(function createStars() {
    const bg = document.getElementById('starsBg');
    for (let i = 0; i < 120; i++) {
        const star = document.createElement('div'); star.className = 'star';
        const size = Math.random() * 2.5 + 1;
        star.style.width = size + 'px'; star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
        star.style.setProperty('--delay', Math.random() * 5 + 's');
        bg.appendChild(star);
    }
    for (let i = 0; i < 3; i++) {
        const shoot = document.createElement('div'); shoot.className = 'shooting-star';
        shoot.style.left = Math.random() * 80 + '%'; shoot.style.top = Math.random() * 40 + '%';
        shoot.style.setProperty('--sdelay', (Math.random() * 8 + i * 4) + 's');
        bg.appendChild(shoot);
    }
})();

    if (gs.length === 0) {
        const def = [];
        for (let i = 0; i < halfVeg; i++) def.push({ emoji: cV[i] || cA[0] || '🥕', prob: 35, type: 'veg', forced: false, learned: false, last: false });
        for (let i = 0; i < halfMeat; i++) def.push({ emoji: cM[i] || cA[cV.length] || '🍤', prob: 25, type: 'meat', forced: false, learned: false, last: false });
        return def;
    }
    const a = ans(gs), preds = [], used = new Set(); let vc = 0, mc = 0;
    const maxVeg = halfVeg, maxMeat = halfMeat;
    const add = (sym, prob, forced, learned) => {
        if (used.has(sym) || !cA.includes(sym)) return;
        const t = cV.includes(sym) ? 'veg' : 'meat';
        if (t === 'veg' && vc >= maxVeg) return;
        if (t === 'meat' && mc >= maxMeat) return;
        preds.push({ emoji: sym, prob: Math.round(Math.min(prob, 95)), type: t, forced, learned, last: sym === las });
        used.add(sym); if (t === 'veg') vc++; else mc++;
    };
    for (const s of a.forced) add(s, a.conf + 20, true, a.src.includes('متعلم'));
    if (!used.has(las)) add(las, 35, false, false);
    const bn = gfr(a.last); for (const s of bn) { if (!used.has(s)) add(s, 25, false, false); }
    for (const s of cA) { if (!used.has(s)) add(s, 15, false, false); }
    preds.sort((a2, b2) => { if (a2.last !== b2.last) return a2.last ? -1 : 1; if (a2.forced !== b2.forced) return a2.forced ? -1 : 1; return b2.prob - a2.prob; });
    return preds.slice(0, predCount);
}

function buildWheel(preds) {
    const container = document.getElementById('wheelContainer'); container.querySelectorAll('.wheel-slot').forEach(el => el.remove());
    const radius = 115, centerX = 160, centerY = 160;
    const topPredEmojis = preds.slice(0, predCount).map(p => p.emoji);
    const topPredMap = {}; preds.slice(0, predCount).forEach((p, i) => { topPredMap[p.emoji] = { prob: p.prob, rank: i }; });
    const allItems = cClock.map((emoji, i) => { const isPred = topPredEmojis.includes(emoji); const predInfo = topPredMap[emoji]; return { emoji, type: cV.includes(emoji) ? 'veg' : 'meat', isPred, rank: predInfo ? predInfo.rank : -1, prob: predInfo ? predInfo.prob : 0 }; });
    const angleStep = 360 / allItems.length;
    allItems.forEach((item, i) => {
        const angleDeg = -90 + (i * angleStep); const angleRad = (angleDeg * Math.PI) / 180;
        const x = centerX + radius * Math.cos(angleRad); const y = centerY + radius * Math.sin(angleRad);
        const slot = document.createElement('div'); slot.className = 'wheel-slot ' + item.type;
        if (item.isPred) {
            if (item.rank < 2) { slot.classList.add('pred-top'); slot.innerHTML = `<span style="font-size:46px;">${item.emoji}</span><span class="slot-badge">👹</span><span class="slot-prob">${item.prob}%</span>`; }
            else { slot.classList.add('pred-mid'); slot.innerHTML = `<span style="font-size:46px;">${item.emoji}</span><span class="slot-badge">😈</span><span class="slot-prob">${item.prob}%</span>`; }
        } else { slot.classList.add('pred-none'); slot.innerHTML = `<span style="font-size:46px;">${item.emoji}</span>`; }
        slot.style.left = x + 'px'; slot.style.top = y + 'px';
        slot.title = item.isPred ? (item.rank < 2 ? '👹 ' : '😈 ') + item.prob + '%' : item.emoji;
        slot.onclick = () => addSymbol(item.emoji); container.appendChild(slot);
    });
    const centerEl = document.getElementById('wheelCenter'); const g = G[cg];
    if (g && g.img && g.img.startsWith('http')) { centerEl.innerHTML = `<img src="${g.img}" alt="${g.n}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`; }
    else if (g && g.img) { centerEl.textContent = g.img; }
    else { centerEl.textContent = las || '🎯'; }
}

function ra() { const preds = gpr(); buildWheel(preds); document.getElementById('gearStrip').innerHTML = Array.from({ length: MS }, (_, i) => { const s = gs[i] || ''; return `<div class="gear-slot${i === gs.length - 1 && s ? ' newest' : ''}">${s}</div>`; }).join(''); uc_(); }
function ex() { const data = { game: cg, user: cu?.id, strip: [...gs], analysis: ans(gs), correct: cc, wrong: wc, percent: (cc + wc) > 0 ? Math.round((cc / (cc + wc)) * 100) : 0, learned: lp, discovered: dp, history: fh.slice(-50), predCount, cloudSynced }; const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'khal_' + cg + '.json'; a.click(); alog('📦'); }

    if (sc) { sc.classList.add('active'); if (id === 'adminScreen') { lap(); refreshGameList(); } if (id === 'gameSelectScreen') await buildGameCards(); }

    document.getElementById('passInput').addEventListener('keydown', e => { if (e.key === 'Enter') cpw(); });
