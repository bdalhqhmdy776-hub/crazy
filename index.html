<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>👑 CRAZY 👑</title>
    <style>
        :root {
            --bg: #06060e;
            --surface: #0f0f23;
            --card: #16163a;
            --border: #252550;
            --gold: #f0a500;
            --red: #e94560;
            --green: #4e9f3d;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --orange: #f97316;
            --text: #e2e2e2;
            --muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden; background: #000;
            font-family: 'Cairo', 'Arial', sans-serif; touch-action: manipulation;
            user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
            color: var(--text); position: fixed; top: 0; left: 0;
        }

        .app {
            width: 100vw; height: 100vh; height: 100dvh; max-width: 420px; margin: 0 auto;
            background: transparent; display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .screen {
            display: none; flex-direction: column; width: 100%; height: 100%; flex: 1;
            overflow-y: auto; padding: 4px; gap: 4px; -webkit-overflow-scrolling: touch;
            position: relative; z-index: 1;
        }
        .screen.active { display: flex; }

        .stars-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay); opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .screen-bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            z-index: 0; opacity: 0.3; transition: background-image 1s ease-in-out; pointer-events: none;
            display: none;
        }

        .header {
            text-align: center; padding: 10px 6px; background: rgba(22,22,58,0.7);
            backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0; position: relative; z-index: 1;
        }
        .header h1 { font-size: 18px; color: var(--red); margin: 0; }
        .header.admin-h { border-color: var(--gold); box-shadow: 0 0 20px rgba(240,165,0,0.3); }
        .header.admin-h h1 { color: var(--gold); }

        .btn {
            background: var(--red); color: #fff; border: none; padding: 10px; border-radius: 20px;
            font-size: 13px; font-weight: bold; cursor: pointer; width: 100%; font-family: inherit;
            flex-shrink: 0; transition: all 0.2s; position: relative; z-index: 1;
        }
        .btn:active { transform: scale(0.96); opacity: 0.85; }
        .btn.sm { padding: 7px 12px; font-size: 11px; width: auto; border-radius: 14px; }
        .btn.outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn.cyan { background: var(--cyan); color: #000; }
        .btn.danger { background: #b91c1c; }
        .btn.purple { background: var(--purple); color: #fff; }
        .btn-row { display: flex; gap: 5px; flex-shrink: 0; position: relative; z-index: 1; }
        .btn-row .btn { flex: 1; }

        input, select, textarea {
            width: 100%; padding: 10px; font-size: 13px; background: rgba(22,22,58,0.7);
            backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); color: #fff;
            border-radius: 10px; text-align: center; outline: none; font-family: inherit;
            flex-shrink: 0; position: relative; z-index: 1;
        }

        .status-msg {
            text-align: center; font-size: 9px; padding: 3px; border-radius: 6px;
            flex-shrink: 0; position: relative; z-index: 1;
        }
        .status-msg.online { color: #4e9f3d; background: rgba(5,26,5,0.7); }
        .status-msg.offline { color: #ff6b6b; background: rgba(26,5,5,0.7); }

        .ad-banner {
            width: 100%; overflow: hidden; flex-shrink: 0; position: relative; border-radius: 8px;
            background: rgba(22,22,58,0.4); border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }
        .ad-banner.image-ad { height: 200px; }
        .ad-banner.text-ad { height: 25px; min-height: 25px; }
        .ad-banner.video-ad { height: 200px; background: #000; }
        .ad-banner.video-ad video { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

        .ad-slide-image { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .ad-slide-image img { height: 200px; width: 400px; object-fit: cover; border-radius: 8px; position: absolute; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .ad-slide-image img.active { opacity: 1; }

        .ad-slide-text {
            white-space: nowrap; animation: marqueeRTL 14s linear infinite;
            font-size: 12px; font-weight: bold; color: #fff;
            text-shadow: 0 0 8px rgba(240,165,0,0.8); padding: 0 10px; line-height: 25px;
        }

        @keyframes marqueeRTL {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .gear-icon-btn {
            position: absolute; top: 8px; right: 8px; width: 38px; height: 38px;
            border-radius: 50%; background: var(--gold); color: #000; font-size: 20px;
            border: none; cursor: pointer; z-index: 5; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 0 12px rgba(240,165,0,0.5); transition: all 0.2s;
        }

        .gear-popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 99; display: none; align-items: center; justify-content: center;
        }
        .gear-popup-overlay.show { display: flex; }

        .gear-popup {
            background: rgba(22,22,58,0.95); backdrop-filter: blur(15px);
            border: 2px solid var(--gold); border-radius: 16px; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; min-width: 180px; text-align: center;
        }
        .gear-popup h3 { color: var(--gold); font-size: 16px; margin: 0; }
        .gear-popup-options { display: flex; gap: 12px; justify-content: center; }

        .gear-popup-option {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold);
            background: transparent; color: var(--gold); font-size: 18px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .gear-popup-option.active { background: var(--gold); color: #000; }

        .wheel-container {
            position: relative; width: 100%; max-width: 390px; aspect-ratio: 1;
            margin: 0 auto; flex-shrink: 0; z-index: 1;
        }
        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 22%; height: 22%; border-radius: 50%; background: rgba(240,165,0,0.9);
            display: flex; align-items: center; justify-content: center; font-size: 200%;
            font-weight: bold; color: #000; z-index: 2;
            box-shadow: 0 0 25px rgba(240,165,0,0.7); overflow: hidden;
        }
        .wheel-center img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .wheel-slot {
            position: absolute; width: 18%; height: 18%; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(22,22,58,0.8); backdrop-filter: blur(5px);
            transition: all 0.2s; z-index: 1; top: 50%; left: 50%;
            transform: translate(-50%, -50%); flex-direction: column; gap: 1px;
        }
        .wheel-slot.veg { box-shadow: 0 0 12px rgba(78,159,61,0.4); }
        .wheel-slot.meat { box-shadow: 0 0 12px rgba(233,69,96,0.4); }
        .wheel-slot.pred-top { box-shadow: 0 0 25px rgba(255,0,0,0.9); animation: pulse-evil 0.8s infinite; background: rgba(40,10,10,0.9); }
        .wheel-slot.pred-mid { box-shadow: 0 0 18px rgba(255,140,0,0.7); background: rgba(40,25,5,0.85); }
        .wheel-slot.pred-none { opacity: 0.45; box-shadow: none; background: rgba(22,22,58,0.5); }

        @keyframes pulse-evil {
            0%, 100% { box-shadow: 0 0 18px rgba(255,0,0,0.7); }
            50% { box-shadow: 0 0 35px rgba(255,0,0,1); }
        }

        .slot-badge { font-size: 55%; line-height: 1; margin-top: 1px; }
        .slot-prob { font-size: 25%; color: var(--gold); font-weight: bold; }

        .gear-strip {
            background: rgba(2,2,8,0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 6px;
            display: flex; gap: 2px; justify-content: center; flex-wrap: wrap;
            min-height: 70px; align-items: center; flex-shrink: 0; margin-top: auto; z-index: 1;
        }
        .gear-slot {
            width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; background: rgba(10,10,34,0.7);
            border: 1px solid rgba(42,42,74,0.5);
        }
        .gear-slot.newest { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        .counter-box {
            display: flex; justify-content: space-around; background: rgba(22,22,58,0.7);
            backdrop-filter: blur(10px); border-radius: 10px; padding: 8px;
            border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; text-align: center; z-index: 1;
        }
        .counter-value { font-size: 18px; font-weight: bold; }
        .counter-value.correct { color: var(--green); }
        .counter-value.wrong { color: var(--red); }
        .counter-label { font-size: 9px; color: var(--muted); }
        .counter-percent { font-size: 13px; font-weight: bold; color: var(--gold); }

        .game-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; position: relative; z-index: 1; }
        .game-card {
            background: rgba(22,22,58,0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 18px 8px;
            text-align: center; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 8px; transition: all 0.2s;
        }
        .game-card h3 { font-size: 13px; color: var(--gold); margin: 0; }
        .game-card .game-icon {
            width: 55px; height: 55px; border-radius: 50%; object-fit: cover;
            font-size: 35px; display: flex; align-items: center; justify-content: center;
        }

        .section {
            background: rgba(22,22,58,0.7); backdrop-filter: blur(10px); border-radius: 10px;
            padding: 8px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; position: relative; z-index: 1;
        }
        .section h3 { font-size: 13px; color: var(--gold); margin-bottom: 6px; }
        .row { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; flex-wrap: wrap; }
        .row label { font-size: 10px; color: var(--muted); min-width: 55px; }
        .row input, .row select { flex: 1; min-width: 60px; padding: 7px; font-size: 11px; }

        .pass-list { max-height: 200px; overflow-y: auto; font-size: 9px; }
        .pass-item {
            display: flex; justify-content: space-between; align-items: center; padding: 5px;
            border-bottom: 1px solid rgba(26,26,58,0.5); gap: 3px; font-size: 9px;
            background: rgba(10,10,40,0.5); border-radius: 6px; margin-bottom: 3px;
        }
        .pass-item button { background: #b91c1c; color: #fff; border: none; padding: 3px 7px; border-radius: 4px; font-size: 8px; cursor: pointer; }
        .pass-item button.unlock { background: var(--orange); }

        .ad-list-item {
            display: flex; justify-content: space-between; align-items: center; padding: 8px;
            background: rgba(10,10,40,0.7); border-radius: 8px; margin-bottom: 4px; gap: 6px; font-size: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-delete-ad {
            background: #dc2626 !important; color: white !important; border: none !important;
            padding: 6px 10px !important; border-radius: 6px !important; cursor: pointer !important;
            font-size: 10px !important; font-weight: bold !important;
        }

        .learn-log {
            font-size: 8px; color: var(--muted); font-family: monospace; background: rgba(2,2,8,0.7);
            padding: 6px; border-radius: 8px; line-height: 1.4; flex-shrink: 0;
            max-height: 40px; overflow-y: auto; z-index: 1;
        }
        .learn-log div { padding: 1px 0; border-bottom: 1px solid rgba(17,17,17,0.5); }
        .spacer { flex: 1; }
        .error-msg { color: #ff6b6b; text-align: center; font-size: 11px; flex-shrink: 0; position: relative; z-index: 1; }

        .admin-tabs { display: flex; gap: 3px; flex-shrink: 0; margin-bottom: 6px; position: relative; z-index: 1; }
        .admin-tab {
            flex: 1; padding: 8px; text-align: center; background: rgba(22,22,58,0.5);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer;
            font-size: 10px; color: var(--muted); transition: all 0.2s;
        }
        .admin-tab.active { background: rgba(240,165,0,0.3); border-color: var(--gold); color: #fff; font-weight: bold; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

        #gameScreen { gap: 2px; padding: 2px; }
    </style>
</head>
<body>
    <div class="stars-bg" id="starsBg"></div>
    <div class="app" id="appRoot">

        <!-- LOGIN SCREEN -->
        <div class="screen active" id="loginScreen">
            <div class="screen-bg-overlay" id="loginScreenBg"></div>
            <div class="ad-banner image-ad" id="loginAd" style="display:none;"></div>
            <div class="spacer"></div>
            <div class="header"><h1>👑 CRAZY 👑</h1></div>
            <div class="status-msg online" id="connectionStatus">🟡</div>
            <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
                <input type="password" id="passInput" placeholder="🔐 كلمة المرور" autocomplete="off">
                <button class="btn" onclick="cpw()">🔓 دخول</button>
                <p class="error-msg" id="loginError"></p>
            </div>
            <div class="spacer"></div>
        </div>

        <!-- GAME SELECT SCREEN -->
        <div class="screen" id="gameSelectScreen">
            <div class="screen-bg-overlay" id="gamesScreenBg"></div>
            <div class="ad-banner image-ad" id="gamesAd" style="display:none;"></div>
            <div class="header"><h1>🎮 اختر اللعبة</h1><div id="selectUser" style="font-size:9px;color:var(--muted);"></div></div>
            <div class="game-cards" id="gameCardsContainer"></div>
            <div class="btn-row"><button class="btn sm outline" onclick="lo()">🚪 خروج</button></div>
        </div>

        <!-- GAME SCREEN -->
        <div class="screen" id="gameScreen">
            <div class="screen-bg-overlay" id="predictScreenBg"></div>
            <div class="ad-banner text-ad" id="predictAd" style="display:none;"><div class="ad-slide-text" id="predictAdSlide"></div></div>
            <div class="wheel-container" id="wheelContainer"><div class="wheel-center" id="wheelCenter">🎯</div></div>
            <div class="gear-strip" id="gearStrip"></div>
            <div class="counter-box">
                <div><span class="counter-value correct" id="correctCount">0</span><span class="counter-label">✅</span></div>
                <div><span class="counter-percent" id="percentDisplay">0%</span></div>
                <div><span class="counter-value wrong" id="wrongCount">0</span><span class="counter-label">❌</span></div>
            </div>
            <div class="learn-log" id="learnLog"><div>🟢 جاهز</div></div>
            <div class="btn-row">
                <button class="btn sm danger" onclick="resetGame()">🔄</button>
                <button class="btn sm cyan" onclick="exportData()">📊</button>
                <button class="btn sm outline" onclick="backToGames()">🔙</button>
            </div>
        </div>

        <!-- ADMIN SCREEN -->
        <div class="screen" id="adminScreen">
            <div class="header admin-h"><h1>👑 لوحة التحكم</h1></div>
            <div class="status-msg online" id="adminConnStatus">🟡</div>
            <div class="admin-tabs">
                <div class="admin-tab active" onclick="switchAdminTab('players')">👥 المشتركين</div>
                <div class="admin-tab" onclick="switchAdminTab('ads')">📢 الإعلانات</div>
                <div class="admin-tab" onclick="switchAdminTab('patterns')">📊 الأنماط</div>
            </div>

            <!-- PLAYERS TAB -->
            <div id="adminPlayersTab">
                <div class="section">
                    <h3>➕ إضافة مشترك جديد</h3>
                    <div class="row"><label>المعرف:</label><input type="text" id="newId" placeholder="اسم المشترك"></div>
                    <div class="row"><label>المفتاح:</label><input type="text" id="newKey" placeholder="المفتاح السري"></div>
                    <div class="row"><label>النمط:</label><select id="newMode"><option value="fixed">ثابت</option><option value="day">يومي</option><option value="hour">ساعي</option><option value="month">شهري</option></select></div>
                    <div class="row"><label>ساعات:</label><input type="number" id="newHours" value="0" min="0"></div>
                    <div class="row"><label>أيام:</label><input type="number" id="newDays" value="0" min="0"></div>
                    <button class="btn sm" style="background:#f97316;" onclick="addPlayer()">✅ إضافة</button>
                </div>
                <div class="section" style="flex:1;min-height:150px;">
                    <h3>📋 المشتركين (<span id="passCount">0</span>)</h3>
                    <div class="pass-list" id="passList"></div>
                    <div class="btn-row" style="margin-top:6px;">
                        <button class="btn sm danger" onclick="deleteAllPlayers()">🗑 حذف الكل</button>
                        <button class="btn sm" style="background:#f97316;" onclick="unlockAllPlayers()">🔓 فك قفل الكل</button>
                    </div>
                </div>
            </div>

            <!-- ADS TAB -->
            <div id="adminAdsTab" style="display:none;">
                <div class="section">
                    <h3>➕ إضافة إعلان</h3>
                    <div class="row"><label>النوع:</label><select id="adType"><option value="image">🖼️ صورة</option><option value="text">📝 نص</option><option value="video">🎬 فيديو</option><option value="background">🎨 خلفية</option></select></div>
                    <div class="row"><label>المكان:</label><select id="adPlace"><option value="login">🔐 تسجيل الدخول</option><option value="games">🎮 البرامج</option><option value="predict">🎯 التوقعات</option></select></div>
                    <div class="row"><label>المحتوى:</label><input type="text" id="adContent" placeholder="رابط أو نص"></div>
                    <button class="btn sm" style="background:#f97316;" onclick="addAd()">✅ إضافة</button>
                </div>
                <div class="section" style="flex:1;min-height:150px;">
                    <h3>📋 الإعلانات (<span id="adCountDisplay">0</span>)</h3>
                    <div id="adListContainer" style="max-height:250px;overflow-y:auto;"></div>
                    <div class="btn-row" style="margin-top:6px;">
                        <button class="btn sm danger" onclick="deleteAllAds()">🗑 مسح الكل</button>
                        <button class="btn sm cyan" onclick="syncAdsFromCloud()">☁️ مزامنة</button>
                    </div>
                </div>
            </div>

            <!-- PATTERNS TAB -->
            <div id="adminPatternsTab" style="display:none;">
                <div class="section">
                    <h3>📊 أنماط البرامج</h3>
                    <div class="row"><label>البرنامج:</label><select id="patternGameSelect" onchange="loadPatternsForGame()"><option value="">اختر برنامج</option></select></div>
                </div>
                <div class="section" style="flex:1;min-height:150px;">
                    <div id="patternListContainer" style="max-height:300px;overflow-y:auto;"></div>
                    <button class="btn sm danger" onclick="clearPatterns()" style="margin-top:6px;">🗑 مسح الأنماط</button>
                </div>
            </div>

            <button class="btn outline" onclick="goToLogin()">🚪 خروج</button>
        </div>
    </div>

    <div class="gear-popup-overlay" id="gearPopupOverlay" onclick="closeGearPopup(event)">
        <div class="gear-popup" onclick="event.stopPropagation()">
            <h3>⚙️ عدد الاحتمالات</h3>

            </div>
            <button class="btn sm outline" onclick="document.getElementById('gearPopupOverlay').classList.remove('show')">إغلاق</button>
        </div>
    </div>

    function getDeviceFingerprint() {
        const data = [navigator.userAgent || '', screen.width + '', new Date().getTimezoneOffset() + ''].join('|');
        let hash = 0;
        for (let i = 0; i < data.length; i++) hash = ((hash << 5) - hash) + data.charCodeAt(i);
        return 'D' + Math.abs(hash).toString(36).toUpperCase();
    }
    const deviceId = getDeviceFingerprint();

    function generateTimeKey(base, mode) {
        const now = new Date();
        const pad = v => ('' + v).padStart(2, '0');
        if (mode === 'hour') return `${base}_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}`;
        if (mode === 'day') return `${base}_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
        if (mode === 'month') return `${base}_${now.getFullYear()}${pad(now.getMonth()+1)}`;
        return `${base}_static`;
    }

    function checkExpiry(player) {
        if (!player.createdAt) return { ex: false, rm: 'غير محدود' };
        const created = new Date(player.createdAt);
        const now = new Date();
        let maxHours = Infinity;
        if (player.maxHours > 0) maxHours = player.maxHours;
        if (player.maxDays > 0) maxHours = Math.min(maxHours, player.maxDays * 24);
        if (maxHours === Infinity) return { ex: false, rm: 'غير محدود' };
        const remaining = new Date(created.getTime() + maxHours * 3600000) - now;
        if (remaining <= 0) return { ex: true, rm: 'منتهي' };
        const rh = Math.floor(remaining / 3600000);
        return { ex: false, rm: rh > 23 ? Math.floor(rh / 24) + ' يوم' : rh + ' ساعة' };
    }

    // ==================== SMART LEARNER ====================
    function analyzeFullStrip() {
        const strip = gs.strip;
        if (strip.length < 2) return { pairs: {}, triplets: {}, quads: {}, vegToMeat: {}, meatToVeg: {}, consecutive: {}, symbolCount: {}, vegCount: 0, meatCount: 0 };
        
        const stats = { symbolCount: {}, vegCount: 0, meatCount: 0, pairs: {}, triplets: {}, quads: {}, vegToMeat: {}, meatToVeg: {}, consecutive: {} };
        
        for (const s of strip) {
            stats.symbolCount[s] = (stats.symbolCount[s] || 0) + 1;
            if (gs.veg.includes(s)) stats.vegCount++;
            if (gs.meat.includes(s)) stats.meatCount++;
        }
        
        for (let i = 1; i < strip.length; i++) {
            const pairKey = strip[i-1] + '>' + strip[i];
            stats.pairs[pairKey] = (stats.pairs[pairKey] || 0) + 1;
            if (gs.veg.includes(strip[i-1]) && gs.meat.includes(strip[i])) stats.vegToMeat[pairKey] = (stats.vegToMeat[pairKey] || 0) + 1;
            if (gs.meat.includes(strip[i-1]) && gs.veg.includes(strip[i])) stats.meatToVeg[pairKey] = (stats.meatToVeg[pairKey] || 0) + 1;
            if (i >= 2) { const tripKey = strip[i-2] + ',' + strip[i-1] + '>' + strip[i]; stats.triplets[tripKey] = (stats.triplets[tripKey] || 0) + 1; }
            if (i >= 3) { const quadKey = strip[i-3] + ',' + strip[i-2] + ',' + strip[i-1] + '>' + strip[i]; stats.quads[quadKey] = (stats.quads[quadKey] || 0) + 1; }
        }
        
        let consCount = 1;
        for (let i = 1; i < strip.length; i++) {
            if (strip[i] === strip[i-1]) { consCount++; }
            else { if (consCount >= 2) stats.consecutive[strip[i-1]] = Math.max(stats.consecutive[strip[i-1]] || 0, consCount); consCount = 1; }
        }
        if (consCount >= 2) stats.consecutive[strip[strip.length-1]] = Math.max(stats.consecutive[strip[strip.length-1]] || 0, consCount);
        return stats;
    }

    function getSmartPredictions() {
        const hv = Math.ceil(gs.predCount / 2), hm = gs.predCount - hv;
        if (gs.strip.length === 0) {
            const d = [];
            for (let i = 0; i < hv; i++) d.push({ emoji: gs.veg[i] || '🥕', prob: 35, type: 'veg' });
            for (let i = 0; i < hm; i++) d.push({ emoji: gs.meat[i] || '🍤', prob: 25, type: 'meat' });
            return d;
        }
        
        const stats = analyzeFullStrip();
        const last1 = gs.strip[gs.strip.length - 1];
        const last2 = gs.strip.length >= 2 ? gs.strip[gs.strip.length - 2] : null;
        const last3 = gs.strip.length >= 3 ? gs.strip[gs.strip.length - 3] : null;
        
        const preds = [], used = new Set();
        let vc = 0, mc = 0;
        
        const addPred = (sym, prob) => {
            if (used.has(sym) || !gs.all.includes(sym)) return;
            const type = gs.veg.includes(sym) ? 'veg' : 'meat';
            if (type === 'veg' && vc >= hv) return;
            if (type === 'meat' && mc >= hm) return;
            preds.push({ emoji: sym, prob: Math.round(Math.min(prob, 98)), type });
            used.add(sym);
            if (type === 'veg') vc++; else mc++;
        };
        
        if (last3 && last2) {
            const quadKey = last3 + ',' + last2 + ',' + last1 + '>';
            Object.entries(stats.quads).filter(([k]) => k.startsWith(quadKey)).sort((a, b) => b[1] - a[1]).forEach(([key, count]) => addPred(key.split('>')[1], 70 + count * 5));
        }
        if (last2) {
            const tripKey = last2 + ',' + last1 + '>';
            Object.entries(stats.triplets).filter(([k]) => k.startsWith(tripKey)).sort((a, b) => b[1] - a[1]).forEach(([key, count]) => addPred(key.split('>')[1], 55 + count * 5));
        }
        const pairKey = last1 + '>';
        Object.entries(stats.pairs).filter(([k]) => k.startsWith(pairKey)).sort((a, b) => b[1] - a[1]).forEach(([key, count]) => addPred(key.split('>')[1], 40 + count * 5));
        
        if (gs.veg.includes(last1)) {
            Object.entries(stats.vegToMeat).filter(([k]) => k.startsWith(last1 + '>')).sort((a, b) => b[1] - a[1]).forEach(([key, count]) => addPred(key.split('>')[1], 35 + count * 5));
        } else {
            Object.entries(stats.meatToVeg).filter(([k]) => k.startsWith(last1 + '>')).sort((a, b) => b[1] - a[1]).forEach(([key, count]) => addPred(key.split('>')[1], 35 + count * 5));
        }
        
        const consCount = stats.consecutive[last1] || 1;
        if (consCount >= 3) {
            const otherType = gs.veg.includes(last1) ? gs.meat : gs.veg;
            for (const sym of otherType) addPred(sym, 40 + consCount * 5);
        }
        
        if (stats.vegCount > stats.meatCount * 1.5) { for (const sym of gs.meat) addPred(sym, 30); }
        else if (stats.meatCount > stats.vegCount * 1.5) { for (const sym of gs.veg) addPred(sym, 30); }
        
        for (const sym of gs.all) addPred(sym, 15);
        
        preds.sort((a, b) => b.prob - a.prob);
        return preds.slice(0, gs.predCount);
    }

    // ==================== GAME ====================
    function addSymbol(symbol) {
        if (gs.strip.length > 0) {
            const predictions = getSmartPredictions();
            const predEmojis = predictions.map(p => p.emoji);
            if (predEmojis.includes(symbol)) { gs.correct++; addLog('✅ ' + symbol); }
            else { gs.wrong++; addLog('❌ ' + symbol); }
            localStorage.setItem('kf_' + currentGame + '_c', gs.correct);
            localStorage.setItem('kf_' + currentGame + '_w', gs.wrong);
            if (gs.strip.length >= 4) {
                const last4 = gs.strip.slice(-4);
                const pk = last4.join(',');
                if (!gs.patterns[pk]) gs.patterns[pk] = { sequence: last4, results: {}, total: 0 };
                gs.patterns[pk].results[symbol] = (gs.patterns[pk].results[symbol] || 0) + 1;
                gs.patterns[pk].total++;
                if (isOnline && db) db.ref('patterns/' + currentGame).set(gs.patterns).catch(()=>{});
            }
        }
        gs.strip.push(symbol);
        if (gs.strip.length > STRIP_MAX) gs.strip.shift();
        addLog('➕ ' + symbol);
        renderWheel();
    }

    function addLog(msg) {

    function renderWheel() {
        const container = document.getElementById('wheelContainer');
        container.querySelectorAll('.wheel-slot').forEach(e => e.remove());
        const gearBtn = container.querySelector('.gear-icon-btn');
        if (gearBtn) gearBtn.remove();
        
        const predictions = getSmartPredictions();
        const predMap = {};
        predictions.forEach((p, i) => { predMap[p.emoji] = { prob: p.prob, rank: i }; });
        
        const w = container.offsetWidth, h = container.offsetHeight;
        const radius = Math.min(w, h) * 0.37, cx = w / 2, cy = h / 2;
        const angleStep = 360 / gs.clock.length;
        
        gs.clock.forEach((emoji, i) => {
            const angle = -90 + (i * angleStep);
            const rad = (angle * Math.PI) / 180;
            const x = cx + radius * Math.cos(rad), y = cy + radius * Math.sin(rad);
            
            const slot = document.createElement('div');
            slot.className = 'wheel-slot ' + (gs.veg.includes(emoji) ? 'veg' : 'meat');
            const fontSize = Math.min(w * 0.097, 38);
            const pred = predMap[emoji];
            
            if (pred) {
                if (pred.rank < 2) {
                    slot.classList.add('pred-top');
                    slot.innerHTML = `<span style="font-size:${fontSize}px;">${emoji}</span><span class="slot-badge">👹</span><span class="slot-prob">${pred.prob}%</span>`;
                } else {
                    slot.classList.add('pred-mid');
                    slot.innerHTML = `<span style="font-size:${fontSize}px;">${emoji}</span><span class="slot-badge">😈</span><span class="slot-prob">${pred.prob}%</span>`;
                }
            } else {
                slot.classList.add('pred-none');
                slot.innerHTML = `<span style="font-size:${fontSize}px;">${emoji}</span>`;
            }
            slot.style.left = x + 'px'; slot.style.top = y + 'px';
            slot.onclick = () => addSymbol(emoji);
            container.appendChild(slot);
        });
        
        const center = document.getElementById('wheelCenter');
        const game = GAMES[currentGame];
        if (game?.img?.startsWith('http')) center.innerHTML = `<img src="${game.img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        else center.textContent = gs.strip.length > 0 ? gs.strip[gs.strip.length - 1] : (game?.img || '🎯');
        
        const gb = document.createElement('button');
        gb.className = 'gear-icon-btn'; gb.textContent = '⚙️';
        gb.onclick = () => document.getElementById('gearPopupOverlay').classList.add('show');
        container.appendChild(gb);
        
        document.getElementById('gearStrip').innerHTML = Array.from({ length: STRIP_MAX }, (_, i) => {
            const sym = gs.strip[i] || '';
            return `<div class="gear-slot${i === gs.strip.length - 1 && sym ? ' newest' : ''}">${sym || '·'}</div>`;
        }).join('');
        
        document.getElementById('correctCount').textContent = gs.correct;
        document.getElementById('wrongCount').textContent = gs.wrong;
        const total = gs.correct + gs.wrong;
        document.getElementById('percentDisplay').textContent = total > 0 ? Math.round((gs.correct / total) * 100) + '%' : '0%';
    }

                container.style.display = 'flex'; container.className = 'ad-banner video-ad';
                const v = document.createElement('video');
                v.src = video.content; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
                v.setAttribute('playsinline', ''); v.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:8px;';
                v.play().catch(() => document.addEventListener('click', function p() { v.play(); document.removeEventListener('click', p); }, { once: true }));
                container.appendChild(v);
            } else {
                const images = Object.values(ADS).filter(a => a.place === place && a.type === 'image');
                if (images.length > 0) {
                    container.style.display = 'flex'; container.className = 'ad-banner image-ad';
                    images.forEach((a, i) => { const img = document.createElement('img'); img.src = a.content; img.style.cssText = 'height:200px;width:400px;object-fit:cover;border-radius:8px;position:absolute;opacity:' + (i===0?'1':'0') + ';transition:opacity 0.8s;'; container.appendChild(img); });
                } else if (place === 'predict') {
                    const texts = Object.values(ADS).filter(a => a.place === 'predict' && a.type === 'text');
                    if (texts.length > 0) { container.style.display = 'flex'; container.className = 'ad-banner text-ad'; container.innerHTML = `<div class="ad-slide-text">${texts.map(a=>a.content).join(' ★★★ ')}</div>`; }
                    else { container.style.display = 'none'; }
                } else { container.style.display = 'none'; }
            }
        });
    }

    async function addAd() {
        const type = document.getElementById('adType').value;
        const place = document.getElementById('adPlace').value;
        const content = document.getElementById('adContent').value.trim();
        if (!content) return alert('أدخل المحتوى');
        ADS['ad_'+Date.now()] = { id: 'ad_'+Date.now(), type, place, content };
        ss('kf_ads', ADS);
        if (isOnline && db) db.ref('ads').set(ADS).catch(()=>{});
        document.getElementById('adContent').value = '';
        refreshAdList(); refreshAllAds();
        alert('✅ تم الإضافة');
    }

    async function deleteAd(id) {
        if (!confirm('حذف الإعلان؟')) return;
        delete ADS[id]; ss('kf_ads', ADS);
        if (isOnline && db) db.ref('ads').set(ADS).catch(()=>{});
        refreshAdList(); refreshAllAds();
    }

    async function deleteAllAds() {
        if (!confirm('حذف الكل؟')) return;
        ADS = {}; ss('kf_ads', ADS);
        if (isOnline && db) db.ref('ads').set({}).catch(()=>{});
        refreshAdList(); refreshAllAds();
    }

    async function syncAdsFromCloud() {
        if (!isOnline || !db) return alert('لا يوجد اتصال');
        const snap = await db.ref('ads').once('value');
        ADS = snap.val() || {}; ss('kf_ads', ADS);
        refreshAdList(); refreshAllAds();
        alert('✅ تمت المزامنة');
    }

    function refreshAdList() {
        const container = document.getElementById('adListContainer');
        const countDisplay = document.getElementById('adCountDisplay');
        if (!container) return;
        ADS = ls('kf_ads', {});
        const arr = Object.values(ADS);
        if (countDisplay) countDisplay.textContent = arr.length;
        if (!arr.length) { container.innerHTML = '<p style="color:#888;text-align:center;">📭 لا توجد إعلانات</p>'; return; }
        const typeNames = { image: '🖼️ صورة', text: '📝 نص', video: '🎬 فيديو', background: '🎨 خلفية' };
        const placeNames = { login: '🔐 تسجيل الدخول', games: '🎮 البرامج', predict: '🎯 التوقعات' };
        container.innerHTML = arr.map(a => `
            <div class="ad-list-item">
                <div class="ad-list-info">
                    <div style="color:var(--gold);font-weight:bold;">${typeNames[a.type]}</div>
                    <div style="font-size:9px;color:var(--muted);">${placeNames[a.place]}</div>
                    <div style="font-size:10px;">${a.content.substring(0,40)}</div>
                </div>
                <button onclick="deleteAd('${a.id}')" class="btn-delete-ad">🗑️</button>
            </div>`).join('');
    }

    // ==================== PATTERNS ====================
    function loadPatternGamesList() {
        const s = document.getElementById('patternGameSelect');
        if (!s) return;
        s.innerHTML = '<option value="">اختر برنامج</option>' + Object.entries(GAMES).map(([k,g]) => `<option value="${k}">${g.n}</option>`).join('');
    }

    function loadPatternsForGame() {
        const gk = document.getElementById('patternGameSelect').value;
        const c = document.getElementById('patternListContainer');
        if (!c) return;
        if (!gk) { c.innerHTML = '<p style="color:#888;text-align:center;">اختر برنامج</p>'; return; }
        
        const patterns = JSON.parse(localStorage.getItem('kf_patterns') || '{}')[gk] || {};
        const entries = Object.entries(patterns);
        
        if (!entries.length) { c.innerHTML = '<p style="color:#888;text-align:center;">لا توجد أنماط</p>'; return; }
        
        c.innerHTML = `<div style="overflow-x:auto;"><table class="pattern-table" style="width:100%;border-collapse:collapse;font-size:10px;">
            <thead><tr style="background:rgba(240,165,0,0.2);color:var(--gold);">
                <th>#</th><th>التسلسل</th><th>النتيجة</th><th>التكرار</th><th>الثقة</th>
            </tr></thead><tbody>
            ${entries.map(([k,p],i) => {
                let best=null,bc=0;
                for(const [s,ct] of Object.entries(p.results)){if(ct>bc){bc=ct;best=s;}}
                const conf=best?Math.round((bc/p.total)*100):0;
                return `<tr>
                    <td>${i+1}</td>
                    <td>${p.sequence.map(s=>`<span style="font-size:14px;">${s}</span>`).join('→')}</td>
                    <td style="font-size:14px;">${best||'?'}</td>
                    <td>${p.total}</td>
                    <td>${conf}%</td>
                </tr>`;
            }).join('')}
        </tbody></table></div>`;
    }

    async function clearPatterns() {
        const gk = document.getElementById('patternGameSelect').value;
        if (!gk) return alert('اختر برنامج');
        if (!confirm('مسح أنماط ' + (GAMES[gk]?.n||gk) + '؟')) return;
        
        const ap = JSON.parse(localStorage.getItem('kf_patterns') || '{}');
        ap[gk] = {};
        localStorage.setItem('kf_patterns', JSON.stringify(ap));
        if (isOnline && db) db.ref('patterns/' + gk).remove().catch(()=>{});
        loadPatternsForGame();
    }

    // ==================== AUTH ====================
    async function cpw() {
        const inp = document.getElementById('passInput').value.trim();
        if (!inp) return;
        document.getElementById('loginError').textContent = '';
        
        if (inp === ADMIN_PASS) {
            document.getElementById('passInput').value = '';
            showScreen('adminScreen');
            refreshPlayerList();
            return;
        }
        
        let players = {};
        if (isOnline && db) { try { const snap = await db.ref('players').once('value'); players = snap.val() || {}; } catch (e) {} }
        if (!Object.keys(players).length) players = ls('kf_players', {});
        if (!Object.keys(players).length) {
            players['player01'] = { id: 'player01', key: 'Khali2024', mode: 'fixed', maxHours: 0, maxDays: 0, lockedDevice: null, createdAt: null };
            ss('kf_players', players);
        }
        
        let found = null;
        for (const p of Object.values(players)) {
            if ([p.key+'_master', p.key+'_static', generateTimeKey(p.key, p.mode), p.key].includes(inp)) { found = p; break; }
        }
        
        if (!found) { document.getElementById('loginError').textContent = '❌ كلمة مرور غير صحيحة'; return; }
        if (checkExpiry(found).ex) { document.getElementById('loginError').textContent = '⏰ منتهي الصلاحية'; return; }
        if (found.lockedDevice && found.lockedDevice !== deviceId) { document.getElementById('loginError').textContent = '🚫 هذا الحساب مقفل على جهاز آخر'; return; }
        
        if (!found.lockedDevice) {
            found.lockedDevice = deviceId;
            found.createdAt = found.createdAt || new Date().toISOString();
            players[found.id] = found;
            ss('kf_players', players);
            if (isOnline && db) db.ref('players/' + found.id).set(found).catch(()=>{});
        }
        
        currentUser = found;
        document.getElementById('selectUser').textContent = '👤 ' + found.id;
        document.getElementById('passInput').value = '';
        showScreen('gameSelectScreen');
    }

    // ==================== INIT ====================
    function initFirebase() {
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            firebase.database().ref('.info/connected').on('value', s => {
                isOnline = s.val() === true;
                const st = isOnline ? '🟢 متصل' : '🔴 غير متصل';
                document.querySelectorAll('#connectionStatus, #adminConnStatus').forEach(el => { if (el) el.textContent = st; });
                if (isOnline) { refreshPlayerList(); }
            });
            db.ref('ads').on('value', s => { if (s.val()) { ADS = s.val(); ss('kf_ads', ADS); refreshAllAds(); } });
            db.ref('games').on('value', s => { if (s.val()) { GAMES = s.val(); ss('kf_games', GAMES); } });
            db.ref('players').on('value', s => { if (s.val()) { ss('kf_players', s.val()); refreshPlayerList(); } });
            db.ref('patterns').on('value', s => {
                if (s.val()) {
                    const lp = JSON.parse(localStorage.getItem('kf_patterns') || '{}');
                    for (const [gk, p] of Object.entries(s.val())) {
                        if (!lp[gk]) lp[gk] = p;
                        else { for (const [pk, pd] of Object.entries(p)) { if (!lp[gk][pk] || pd.total > lp[gk][pk].total) lp[gk][pk] = pd; } }
                    }
                    localStorage.setItem('kf_patterns', JSON.stringify(lp));
                }
            });
        } catch (e) {}
    }

    async function init() {
        initFirebase();
        await buildGameCards();
        refreshAllAds();
        document.getElementById('passInput').addEventListener('keydown', e => { if (e.key === 'Enter') cpw(); });
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
